<style>
/* ── Premium design system ─────────────────────────────────────────────────
   A single, restrained, theme-aware system: a signature violet→blue accent,
   layered glass surfaces with a top highlight edge, tabular numerals, and
   deliberate micro-interactions. Status semantics match the TUI.               */
:root {
  color-scheme: light dark;
  /* dark is the default */
  --bg: #070810; --bg-2: #0c0e18; --mesh-1: #221a4d; --mesh-2: #10233f;
  --panel: rgba(23,26,38,.72); --panel-solid: #171a26; --panel-2: #1c2030; --panel-3: #262b3d;
  --ink: #eef0f8; --ink-dim: #a6adc2; --ink-faint: #6a7186;
  --line: rgba(255,255,255,.07); --line-2: rgba(255,255,255,.12); --edge-hi: rgba(255,255,255,.10);
  --accent: #8b7bff; --accent-2: #5b8cff; --accent-ink: #b9adff;
  --active: #5c9dff; --delivered: #40cf8e; --escalated: #f6b545; --available: #6b7288; --coord: #a78cff;
  --grad: linear-gradient(135deg, #8b7bff 0%, #5b8cff 100%);
  --grad-soft: linear-gradient(135deg, color-mix(in srgb,#8b7bff 22%,transparent), color-mix(in srgb,#5b8cff 22%,transparent));
  --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
  --shadow: 0 4px 12px rgba(0,0,0,.35), 0 18px 48px rgba(0,0,0,.45);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.45), 0 32px 80px rgba(0,0,0,.55);
  --glow: 0 0 0 1px color-mix(in srgb, var(--accent) 40%, transparent), 0 8px 30px color-mix(in srgb, var(--accent) 28%, transparent);
  --ring: color-mix(in srgb, var(--accent) 60%, transparent);
  --radius: 18px; --radius-sm: 12px;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
  --mono: "SF Mono", ui-monospace, "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
}
:root[data-theme="light"] {
  --bg: #eef1f8; --bg-2: #f6f8fc; --mesh-1: #dfe3ff; --mesh-2: #e2f0ff;
  --panel: rgba(255,255,255,.78); --panel-solid: #ffffff; --panel-2: #f3f5fb; --panel-3: #e9edf6;
  --ink: #141826; --ink-dim: #515a70; --ink-faint: #8a92a6;
  --line: rgba(20,24,40,.09); --line-2: rgba(20,24,40,.14); --edge-hi: rgba(255,255,255,.9);
  --accent: #5a44e4; --accent-2: #2f6fe0; --accent-ink: #4a37c9;
  --active: #2f6fe0; --delivered: #10a15b; --escalated: #c9820f; --available: #9aa1b2; --coord: #6a45dd;
  --grad: linear-gradient(135deg, #6a55f0 0%, #3f7ce8 100%);
  --grad-soft: linear-gradient(135deg, color-mix(in srgb,#6a55f0 12%,transparent), color-mix(in srgb,#3f7ce8 12%,transparent));
  --shadow-sm: 0 1px 2px rgba(20,24,44,.06);
  --shadow: 0 2px 8px rgba(20,24,44,.07), 0 16px 44px rgba(20,24,44,.10);
  --shadow-lg: 0 8px 24px rgba(20,24,44,.10), 0 32px 80px rgba(20,24,44,.14);
  --glow: 0 0 0 1px color-mix(in srgb, var(--accent) 30%, transparent), 0 10px 30px color-mix(in srgb, var(--accent) 18%, transparent);
  --ring: color-mix(in srgb, var(--accent) 42%, transparent);
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) {
    --bg: #eef1f8; --bg-2: #f6f8fc; --mesh-1: #dfe3ff; --mesh-2: #e2f0ff;
    --panel: rgba(255,255,255,.78); --panel-solid: #ffffff; --panel-2: #f3f5fb; --panel-3: #e9edf6;
    --ink: #141826; --ink-dim: #515a70; --ink-faint: #8a92a6;
    --line: rgba(20,24,40,.09); --line-2: rgba(20,24,40,.14); --edge-hi: rgba(255,255,255,.9);
    --accent: #5a44e4; --accent-2: #2f6fe0; --accent-ink: #4a37c9;
    --active: #2f6fe0; --delivered: #10a15b; --escalated: #c9820f; --available: #9aa1b2; --coord: #6a45dd;
    --grad: linear-gradient(135deg, #6a55f0 0%, #3f7ce8 100%);
    --grad-soft: linear-gradient(135deg, color-mix(in srgb,#6a55f0 12%,transparent), color-mix(in srgb,#3f7ce8 12%,transparent));
    --shadow-sm: 0 1px 2px rgba(20,24,44,.06);
    --shadow: 0 2px 8px rgba(20,24,44,.07), 0 16px 44px rgba(20,24,44,.10);
    --shadow-lg: 0 8px 24px rgba(20,24,44,.10), 0 32px 80px rgba(20,24,44,.14);
    --glow: 0 0 0 1px color-mix(in srgb, var(--accent) 30%, transparent), 0 10px 30px color-mix(in srgb, var(--accent) 18%, transparent);
    --ring: color-mix(in srgb, var(--accent) 42%, transparent);
  }
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0; color: var(--ink);
  background:
    radial-gradient(60rem 40rem at 82% -10%, color-mix(in srgb, var(--mesh-1) 85%, transparent), transparent 60%),
    radial-gradient(50rem 34rem at 6% 4%, color-mix(in srgb, var(--mesh-2) 75%, transparent), transparent 55%),
    var(--bg);
  background-attachment: fixed;
  font-family: var(--sans); font-size: 14px; line-height: 1.5;
  font-feature-settings: "cv02" 1, "cv11" 1, "ss01" 1;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}
.num { font-variant-numeric: tabular-nums; }
a { color: var(--accent-ink); text-decoration: none; font-weight: 550; }
a:hover { text-decoration: underline; }
button { font: inherit; color: inherit; cursor: pointer; }
:focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; border-radius: 8px; }
::-webkit-scrollbar { width: 12px; height: 12px; }
::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 10px; border: 3px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); background-clip: padding-box; border: 3px solid transparent; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 color-mix(in srgb, currentColor 55%, transparent); } 70% { box-shadow: 0 0 0 5px transparent; } }

/* ── Top bar ─────────────────────────────────────────────────────────────── */
.topbar {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  padding: 11px 22px; position: sticky; top: 0; z-index: 30;
  background: color-mix(in srgb, var(--panel-solid) 72%, transparent);
  backdrop-filter: blur(20px) saturate(1.6); -webkit-backdrop-filter: blur(20px) saturate(1.6);
  border-bottom: 1px solid var(--line);
  box-shadow: 0 1px 0 var(--edge-hi) inset, 0 8px 24px -18px rgba(0,0,0,.6);
}
.brand { display: flex; align-items: center; gap: 11px; }
.brand .mark { width: 26px; height: 26px; border-radius: 8px; background: var(--grad); display: grid; place-items: center; color: #fff; font-family: var(--mono); font-weight: 800; font-size: 15px; box-shadow: 0 4px 14px -4px color-mix(in srgb, var(--accent) 70%, transparent); }
.brand .logo { font-weight: 800; font-size: 16px; letter-spacing: -.02em; }
.brand .ctx { color: var(--accent-ink); font-weight: 750; letter-spacing: -.01em; }
.brand .coord { color: var(--ink-dim); font-size: 12.5px; }
.kpis { display: flex; align-items: stretch; gap: 8px; flex-wrap: wrap; margin-left: auto; }
.kpi {
  position: relative; display: inline-flex; flex-direction: column; justify-content: center;
  gap: 1px; padding: 6px 13px 7px; min-width: 62px;
  background: linear-gradient(180deg, color-mix(in srgb, var(--panel-solid) 92%, transparent), var(--panel-2));
  border: 1px solid var(--line); border-radius: var(--radius-sm);
  box-shadow: var(--shadow-sm), 0 1px 0 var(--edge-hi) inset; overflow: hidden; transition: transform .14s, border-color .14s;
}
.kpi:hover { transform: translateY(-1px); border-color: var(--line-2); }
.kpi b { font-size: 17px; font-weight: 750; letter-spacing: -.03em; line-height: 1.05; font-variant-numeric: tabular-nums; }
.kpi .l { font-size: 10.5px; color: var(--ink-dim); font-weight: 550; letter-spacing: .01em; }
.kpi::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--available); opacity: .0; }
.kpi.s-active b { color: var(--active); } .kpi.s-active::before { background: var(--active); opacity: .9; }
.kpi.s-delivered b { color: var(--delivered); } .kpi.s-delivered::before { background: var(--delivered); opacity: .9; }
.kpi.s-escalated b { color: var(--escalated); } .kpi.s-escalated::before { background: var(--escalated); opacity: .9; }
.kpi.s-available b { color: var(--available); } .kpi.s-available::before { background: var(--available); opacity: .6; }
.kpi-div { width: 1px; align-self: stretch; background: var(--line-2); margin: 4px 4px; }
.tb-actions { display: flex; align-items: center; gap: 10px; }
.conn {
  display: inline-flex; align-items: center; gap: 7px; font-size: 12px; color: var(--ink-dim); font-weight: 600;
  padding: 6px 12px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--line); box-shadow: var(--shadow-sm);
}
.conn .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--available); color: var(--available); }
.conn.live { color: var(--delivered); } .conn.live .dot { background: var(--delivered); color: var(--delivered); animation: pulse 2.4s infinite; }
.conn.down { color: var(--escalated); } .conn.down .dot { background: var(--escalated); color: var(--escalated); animation: pulse 1.2s infinite; }
/* segmented theme control */
.seg { display: inline-flex; padding: 3px; gap: 2px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 11px; box-shadow: var(--shadow-sm), 0 1px 0 var(--edge-hi) inset; }
.seg button { width: 30px; height: 28px; display: grid; place-items: center; border: none; background: transparent; border-radius: 8px; color: var(--ink-faint); font-size: 14px; transition: color .14s, background .14s, box-shadow .14s; }
.seg button:hover { color: var(--ink-dim); }
.seg button.on { color: #fff; background: var(--grad); box-shadow: 0 4px 12px -4px color-mix(in srgb, var(--accent) 70%, transparent); }

/* ── Layout ──────────────────────────────────────────────────────────────── */
.shell { display: flex; flex-direction: column; height: calc(100dvh - 61px); }
.cockpit { display: grid; grid-template-columns: minmax(0,1fr) 372px; gap: 18px; padding: 18px; overflow: hidden; flex: 1; min-height: 0; }
.main-col { display: flex; flex-direction: column; gap: 18px; min-width: 0; overflow: auto; padding-right: 3px; }
.side-col { overflow: auto; min-height: 0; }
.card {
  position: relative; background: linear-gradient(180deg, color-mix(in srgb, var(--panel-solid) 88%, transparent), var(--panel-2));
  border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow);
}
.card::after { content: ""; position: absolute; inset: 0; border-radius: inherit; box-shadow: 0 1px 0 var(--edge-hi) inset; pointer-events: none; }
.card > h2 {
  margin: 0; padding: 15px 20px; font-size: 11px; letter-spacing: .18em; text-transform: uppercase; font-weight: 700;
  color: var(--ink-faint); border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 9px;
}
.card > h2::before { content: ""; width: 4px; height: 13px; border-radius: 3px; background: var(--grad); }
.card > h2 .count { margin-left: auto; color: var(--ink-dim); letter-spacing: 0; text-transform: none; font-weight: 600; font-size: 12px; }

/* ── Org chart ───────────────────────────────────────────────────────────── */
.org-wrap { overflow: auto; padding: 14px 8px; }
.org svg { display: block; }
.node-box { cursor: pointer; }
.node-box rect { transition: filter .16s; }
.node-box:hover rect { filter: url(#soft) brightness(1.06); }
.node-box.sel rect { stroke-width: 2.4px; filter: url(#glow); }
.node-title { font-family: var(--sans); font-weight: 680; letter-spacing: -.01em; }
.node-sub { font-family: var(--sans); }
.edge { fill: none; stroke: var(--line-2); stroke-dasharray: 5 5; opacity: .9; }
.edge-label { fill: var(--ink-faint); font-size: 10px; font-weight: 600; letter-spacing: .03em; }
.link { fill: none; stroke: var(--line-2); stroke-width: 1.5px; }

/* ── Pipeline board ──────────────────────────────────────────────────────── */
.board { display: flex; gap: 14px; padding: 16px; overflow-x: auto; }
.lane { flex: 1 0 205px; min-width: 205px; background: color-mix(in srgb, var(--panel-2) 70%, transparent); border: 1px solid var(--line); border-radius: 15px; display: flex; flex-direction: column; }
.lane > header { padding: 11px 14px; font-size: 10.5px; letter-spacing: .13em; text-transform: uppercase; font-weight: 700; color: var(--ink-dim); display: flex; gap: 9px; align-items: center; border-bottom: 1px solid var(--line); }
.lane > header .pip { width: 9px; height: 9px; border-radius: 50%; box-shadow: 0 0 10px -1px currentColor; }
.lane > header .lc { margin-left: auto; color: var(--ink-faint); font-variant-numeric: tabular-nums; background: var(--panel-3); padding: 1px 8px; border-radius: 999px; font-size: 11px; }
.lane .cards { padding: 12px; display: flex; flex-direction: column; gap: 10px; min-height: 40px; }
.pcard {
  position: relative; background: var(--panel-solid); border: 1px solid var(--line); border-radius: 13px; padding: 12px 13px 12px 15px;
  cursor: pointer; transition: transform .14s, box-shadow .14s, border-color .14s; box-shadow: var(--shadow-sm);
}
.pcard::before { content: ""; position: absolute; left: 0; top: 10px; bottom: 10px; width: 3px; border-radius: 3px; background: var(--available); }
.pcard:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--line-2); }
.pcard .who { font-weight: 680; font-size: 13.5px; letter-spacing: -.01em; }
.pcard .meta { color: var(--ink-dim); font-size: 12px; display: flex; gap: 6px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
.pcard .repo-tag { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }
.empty { color: var(--ink-faint); font-size: 12.5px; padding: 10px 2px; }

.bd-active::before { background: var(--active); box-shadow: 0 0 12px -2px var(--active); } .bg-active { background: var(--active); color: var(--active); }
.bd-delivered::before { background: var(--delivered); box-shadow: 0 0 12px -2px var(--delivered); } .bg-delivered { background: var(--delivered); color: var(--delivered); }
.bd-escalated::before { background: var(--escalated); box-shadow: 0 0 12px -2px var(--escalated); } .bg-escalated { background: var(--escalated); color: var(--escalated); }
.bd-available::before { background: var(--available); } .bg-available { background: var(--available); color: var(--available); }
.bd-merged::before { background: var(--delivered); box-shadow: 0 0 12px -2px var(--delivered); } .bg-merged { background: var(--delivered); color: var(--delivered); }
.bd-removed::before { background: var(--ink-faint); } .bg-removed { background: var(--ink-faint); color: var(--ink-faint); }
.c-active { color: var(--active); } .c-delivered { color: var(--delivered); } .c-escalated { color: var(--escalated); }
.c-available { color: var(--available); } .c-merged { color: var(--delivered); } .c-removed { color: var(--ink-faint); }

/* chips — soft gradient fill + glowing dot */
.chip {
  display: inline-flex; align-items: center; gap: 6px; padding: 2px 10px 2px 8px; border-radius: 999px;
  font-size: 11px; font-weight: 650; letter-spacing: .01em; line-height: 1.7; color: var(--available);
  background: linear-gradient(180deg, color-mix(in srgb, currentColor 20%, transparent), color-mix(in srgb, currentColor 11%, transparent));
  border: 1px solid color-mix(in srgb, currentColor 30%, transparent);
}
.chip .pip { width: 7px; height: 7px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px 0 currentColor; }
.chip.c-active .pip { animation: pulse 2.4s infinite; }

/* ── Detail panel ────────────────────────────────────────────────────────── */
.detail h3 { margin: 0 0 4px; font-size: 18px; font-weight: 750; letter-spacing: -.02em; }
.detail .sub { color: var(--ink-dim); font-size: 12.5px; margin-bottom: 16px; }
.detail dl { margin: 0; display: grid; grid-template-columns: auto 1fr; gap: 8px 14px; align-items: baseline; }
.detail dt { color: var(--ink-faint); font-size: 10.5px; letter-spacing: .05em; text-transform: uppercase; font-weight: 700; }
.detail dd { margin: 0; font-size: 12.5px; word-break: break-word; }
.detail .section { margin-top: 17px; padding-top: 15px; border-top: 1px solid var(--line); }
.detail .section h4 { margin: 0 0 10px; font-size: 10.5px; letter-spacing: .13em; text-transform: uppercase; font-weight: 700; color: var(--ink-faint); }
.mini { display: flex; flex-direction: column; gap: 9px; }
.mini .row { display: flex; align-items: center; gap: 9px; font-size: 12.5px; }
.mono { font-family: var(--mono); font-size: 11.5px; color: var(--ink-dim); }
.hint { color: var(--ink-faint); font-size: 12.5px; line-height: 1.6; }
/* PR link as a premium micro-button */
.detail a[target], .pcard a[target], .timeline a[target], .mono a[target] {
  display: inline-flex; align-items: center; gap: 3px; padding: 1px 8px; border-radius: 999px; font-size: 11px; font-weight: 650;
  background: var(--grad-soft); border: 1px solid color-mix(in srgb, var(--accent) 32%, transparent); color: var(--accent-ink); text-decoration: none;
  transition: filter .14s, transform .1s;
}
.detail a[target]:hover, .pcard a[target]:hover, .timeline a[target]:hover { filter: brightness(1.08); text-decoration: none; }
.detail a[target]:active { transform: scale(.96); }

/* ── Terminal drawer ─────────────────────────────────────────────────────── */
.term { border-top: 1px solid var(--line); background: color-mix(in srgb, var(--panel-solid) 88%, transparent); backdrop-filter: blur(14px); display: flex; flex-direction: column; transition: height .2s cubic-bezier(.4,0,.2,1); overflow: hidden; }
.term.closed { height: 46px; }
.term.open { height: 340px; }
.term header { height: 46px; flex: 0 0 46px; display: flex; align-items: center; gap: 11px; padding: 0 18px; cursor: pointer; user-select: none; border-bottom: 1px solid transparent; }
.term.open header { border-bottom-color: var(--line); }
.term header .ti { width: 24px; height: 24px; border-radius: 7px; background: var(--grad); color: #fff; display: grid; place-items: center; font-family: var(--mono); font-weight: 800; font-size: 12px; }
.term header b { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-dim); font-weight: 700; }
.term header .tstate { font-size: 11.5px; color: var(--ink-faint); font-family: var(--mono); }
.term header .chev { margin-left: auto; color: var(--ink-faint); transition: transform .2s; }
.term.open header .chev { transform: rotate(180deg); }
.term-body { flex: 1; min-height: 0; display: flex; flex-direction: column; }
.term-out { flex: 1; overflow: auto; margin: 0; padding: 14px 18px; white-space: pre-wrap; word-break: break-word; font-family: var(--mono); font-size: 12.5px; line-height: 1.6; color: var(--ink); background: color-mix(in srgb, var(--bg) 60%, #000 8%); }
:root[data-theme="light"] .term-out { background: #f7f9fe; }
.term-inline { display: flex; align-items: center; gap: 10px; padding: 10px 18px; border-top: 1px solid var(--line); background: var(--panel-2); }
.term-inline .ps { color: var(--delivered); font-family: var(--mono); font-size: 13px; font-weight: 800; }
.term-inline input { flex: 1; background: transparent; border: none; outline: none; color: var(--ink); font-family: var(--mono); font-size: 12.5px; }
.term-inline input::placeholder { color: var(--ink-faint); }
.a-1{font-weight:700}.a-2{opacity:.7}.a-3{font-style:italic}.a-4{text-decoration:underline}
.a-30{color:#7a8290}.a-31{color:#f16d78}.a-32{color:#5fd39a}.a-33{color:#eecb6a}
.a-34{color:#6aa8ff}.a-35{color:#c99cf0}.a-36{color:#57c6d6}.a-37{color:#c8cdd8}
.a-90{color:var(--ink-faint)}.a-91{color:#f16d78}.a-92{color:#5fd39a}.a-93{color:#eecb6a}
.a-94{color:#6aa8ff}.a-95{color:#c99cf0}.a-96{color:#57c6d6}.a-97{color:var(--ink)}

/* ── Mobile ──────────────────────────────────────────────────────────────── */
.mobile { display: none; }
.tabbar { display: none; }
@media (max-width: 899px) {
  .cockpit { display: none; }
  .desktop-only { display: none; }
  .mobile { display: block; padding: 15px; padding-bottom: 88px; overflow: auto; flex: 1; }
  .shell { height: 100dvh; }
  .tabbar {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
    background: color-mix(in srgb, var(--panel-solid) 82%, transparent); backdrop-filter: blur(20px) saturate(1.6);
    border-top: 1px solid var(--line); padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
    box-shadow: 0 1px 0 var(--edge-hi) inset;
  }
  .tabbar button { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 7px 0; font-size: 10.5px; font-weight: 600; color: var(--ink-faint); border-radius: 13px; transition: background .16s, color .16s; }
  .tabbar button .ic { font-size: 18px; }
  .tabbar button.on { color: #fff; background: var(--grad); box-shadow: 0 6px 16px -6px color-mix(in srgb, var(--accent) 70%, transparent); }
  .kpis { width: 100%; margin-left: 0; }
  .topbar { padding: 11px 16px; }
  .m-section { margin-bottom: 16px; }
  .m-repo { background: linear-gradient(180deg, var(--panel-solid), var(--panel-2)); border: 1px solid var(--line); border-radius: 16px; margin-bottom: 12px; box-shadow: var(--shadow); overflow: hidden; }
  .m-repo > summary { list-style: none; padding: 14px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .m-repo > summary::-webkit-details-marker { display: none; }
  .m-repo > summary .rname { font-weight: 750; letter-spacing: -.01em; }
  .m-repo > summary .stack { color: var(--ink-faint); font-size: 11px; font-family: var(--mono); }
  .m-repo .worker { padding: 12px 16px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 11px; }
  .m-repo .worker .nm { font-weight: 680; }
  .m-repo .worker .rl { color: var(--ink-dim); font-size: 12px; }
  .timeline { position: relative; padding-left: 24px; }
  .timeline .ev { position: relative; padding: 10px 0; cursor: pointer; }
  .timeline .ev::before { content: ""; position: absolute; left: -16px; top: 15px; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px var(--bg), 0 0 10px -1px var(--accent); }
  .timeline::before { content: ""; position: absolute; left: -12px; top: 6px; bottom: 6px; width: 2px; background: var(--line-2); }
  .term.open { height: 66vh; }
  .m-tree ul { list-style: none; margin: 0; padding-left: 18px; }
  .m-tree > ul { padding-left: 0; }
  .m-tree li { padding: 4px 0; }
  .m-tree .tnode { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
}
@media (min-width: 900px) { .m-only { display: none; } }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <span class="mark">A</span><span class="logo">AIPe</span><span class="ctx" id="ctxName">—</span>
    <span class="coord" id="coordName"></span>
  </div>
  <div class="kpis" id="kpis"></div>
  <div class="tb-actions">
    <div class="conn" id="conn"><span class="dot"></span><span id="connLabel">connecting</span></div>
    <div class="seg" id="themeSeg" role="group" aria-label="Theme">
      <button data-theme="" title="Auto" aria-label="Auto">◐</button>
      <button data-theme="light" title="Light" aria-label="Light">☀</button>
      <button data-theme="dark" title="Dark" aria-label="Dark">☾</button>
    </div>
  </div>
</div>

<div class="shell">
  <div class="cockpit desktop-only">
    <div class="main-col">
      <section class="card">
        <h2>Organograma <span class="count" id="orgCount"></span></h2>
        <div class="org-wrap org" id="org"></div>
      </section>
      <section class="card">
        <h2>Pipeline <span class="count" id="pipeCount"></span></h2>
        <div class="board" id="board"></div>
      </section>
    </div>
    <aside class="side-col">
      <section class="card detail" style="padding:20px" id="detail"></section>
    </aside>
  </div>

  <div class="mobile m-only" id="mobile"></div>

  <div class="term closed" id="term">
    <header id="termHead">
      <span class="ti">›_</span><b>Terminal</b>
      <span class="tstate" id="termState">disconnected</span>
      <span class="chev">▲</span>
    </header>
    <div class="term-body">
      <pre class="term-out" id="termOut"></pre>
      <div class="term-inline">
        <span class="ps" id="termPs">$</span>
        <input id="termIn" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="run a command… (aipe, git, bun test)" />
      </div>
    </div>
  </div>
</div>

<nav class="tabbar m-only" id="tabbar">
  <button data-tab="overview" class="on"><span class="ic">▤</span>Overview</button>
  <button data-tab="org"><span class="ic">◈</span>Org</button>
  <button data-tab="pipeline"><span class="ic">▦</span>Pipeline</button>
  <button data-tab="terminal"><span class="ic">›_</span>Terminal</button>
</nav>

<script>
"use strict";
const S = { snap: null, sel: null, tab: "overview", theme: localStorage.getItem("aipe-theme") || "" };
const STAGES = [
  { key: "dispatched", label: "Dispatched", cls: "active", match: ["dispatched"] },
  { key: "delivered", label: "Delivered", cls: "delivered", match: ["delivered"] },
  { key: "escalated", label: "Escalated", cls: "escalated", match: ["escalated"] },
  { key: "merged", label: "Merged", cls: "merged", match: ["merged"] },
];
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const el = (id) => document.getElementById(id);

function statusCls(st) { return ["active", "delivered", "escalated", "available"].includes(st) ? st : "available"; }
function stageOf(status) { const s = STAGES.find((g) => g.match.includes(status)); return s ? s.key : status === "removed" ? "removed" : "dispatched"; }
function chipCls(st) { return st === "merged" ? "merged" : st === "removed" ? "removed" : st === "dispatched" ? "active" : statusCls(st); }
function chip(st) { return `<span class="chip c-${chipCls(st)}"><span class="pip"></span>${esc(st)}</span>`; }

// ── Theme (segmented: auto / light / dark) ──────────────────────────────────
function applyTheme() {
  if (S.theme) document.documentElement.setAttribute("data-theme", S.theme);
  else document.documentElement.removeAttribute("data-theme");
  [...el("themeSeg").children].forEach((b) => b.classList.toggle("on", b.dataset.theme === S.theme));
}
el("themeSeg").addEventListener("click", (e) => {
  const b = e.target.closest("button[data-theme]"); if (!b) return;
  S.theme = b.dataset.theme;
  localStorage.setItem("aipe-theme", S.theme);
  applyTheme();
  if (S.snap) renderOrg(S.snap);
});
applyTheme();

// ── Top bar ────────────────────────────────────────────────────────────────
function statPill(cls, n, l) { return `<span class="kpi ${cls}"><b class="num">${n}</b><span class="l">${l}</span></span>`; }
function renderTop(s) {
  el("ctxName").textContent = s.context.name;
  el("coordName").textContent = "· coordinator " + s.context.coordinator;
  const c = s.counts;
  el("kpis").innerHTML =
    statPill("", c.hired, "hired") + statPill("s-active", c.active, "active") + statPill("s-available", c.available, "available") +
    statPill("s-delivered", c.delivered, "delivered") + statPill("s-escalated", c.escalated, "escalated") +
    `<span class="kpi-div"></span>` +
    statPill("", s.worktrees, "worktrees") + statPill("", s.skills, "skills") + statPill("", s.mcps, "mcps");
}

// ── Org chart (desktop SVG) ─────────────────────────────────────────────────
function renderOrg(s) {
  el("orgCount").textContent = `${s.repos.length} repos · ${s.counts.hired} specialists`;
  const repos = s.repos;
  const specsByRepo = {};
  repos.forEach((r) => (specsByRepo[r] = s.workers.filter((w) => w.repo === r)));
  const COLW = (r) => Math.max(158, specsByRepo[r].length * 130 || 158);
  const gap = 34;
  let x = 24, cols = [];
  repos.forEach((r) => { const w = COLW(r); cols.push({ r, x, w, cx: x + w / 2 }); x += w + gap; });
  const totalW = Math.max(600, x + 24);
  const yCoord = 48, yRepo = 158, ySpec0 = 262, specH = 64;
  const maxSpecs = Math.max(1, ...repos.map((r) => specsByRepo[r].length));
  const totalH = ySpec0 + maxSpecs * specH + 24;
  const cxAll = totalW / 2;
  const P = [];
  (s.relations || []).forEach((e) => {
    const a = cols.find((c) => c.r === e.from), b = cols.find((c) => c.r === e.to);
    if (!a || !b) return;
    const y = yRepo - 10, midx = (a.cx + b.cx) / 2, lift = 48 + Math.abs(a.cx - b.cx) * 0.06;
    P.push(`<path class="edge" d="M ${a.cx} ${y} Q ${midx} ${y - lift} ${b.cx} ${y}" />`);
    P.push(`<text class="edge-label" x="${midx}" y="${y - lift + 4}" text-anchor="middle">${esc(e.type)}</text>`);
  });
  cols.forEach((c) => {
    P.push(`<path class="link" d="M ${cxAll} ${yCoord + 22} C ${cxAll} ${yRepo}, ${c.cx} ${yCoord + 22}, ${c.cx} ${yRepo - 16}" />`);
    specsByRepo[c.r].forEach((w, i) => {
      const sy = ySpec0 + i * specH;
      P.push(`<path class="link" d="M ${c.cx} ${yRepo + 36} L ${c.cx} ${sy - 3}" />`);
    });
  });
  const box = (cx, y, w, h, fill, stroke, label, sub, sel, click, tone) => {
    const x0 = cx - w / 2;
    return `<g class="node-box ${sel ? "sel" : ""}" ${click} tabindex="0" role="button">
      <rect x="${x0}" y="${y}" width="${w}" height="${h}" rx="13" fill="${fill}" stroke="${stroke}" stroke-width="1.4" filter="url(#soft)" />
      ${tone ? `<circle cx="${x0 + 15}" cy="${y + h / 2}" r="4.5" fill="${tone}"/>` : ""}
      <text class="node-title" x="${cx + (tone ? 7 : 0)}" y="${y + (sub ? 21 : h / 2 + 4)}" text-anchor="middle" fill="var(--ink)" font-size="13">${esc(label)}</text>
      ${sub ? `<text class="node-sub" x="${cx + (tone ? 7 : 0)}" y="${y + 37}" text-anchor="middle" fill="var(--ink-dim)" font-size="11">${esc(sub)}</text>` : ""}
    </g>`;
  };
  const toneVar = { active: "var(--active)", delivered: "var(--delivered)", escalated: "var(--escalated)", available: "var(--available)" };
  const coord = s.workers.find((w) => w.role === "coordinator");
  const selC = S.sel && S.sel.kind === "coordinator";
  const defs = `<defs>
    <filter id="soft" x="-30%" y="-40%" width="160%" height="180%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.20"/></filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#8b7bff" flood-opacity="0.6"/></filter>
  </defs>`;
  P.push(box(cxAll, yCoord, 210, 44, "color-mix(in srgb, var(--coord) 14%, var(--panel-solid))", "var(--coord)", coord ? coord.name : "coordinator", "coordinator", selC, `onclick="pick('coordinator')"`, "var(--coord)"));
  cols.forEach((c) => {
    const selR = S.sel && S.sel.kind === "repo" && S.sel.id === c.r;
    const stack = (s.repoInfos.find((ri) => ri.name === c.r) || {}).stack;
    P.push(box(c.cx, yRepo - 16, Math.min(c.w - 8, 196), 50, "var(--panel-2)", "var(--line-2)", c.r, (stack && stack.join(" · ")) || "repo", selR, `onclick="pick('repo','${esc(c.r)}')"`, ""));
    specsByRepo[c.r].forEach((w, i) => {
      const sy = ySpec0 + i * specH;
      const selW = S.sel && S.sel.kind === "worker" && S.sel.id === w.name;
      const cl = statusCls(w.status);
      const sub = w.module ? `${w.role} · ${w.module}` : w.role;
      P.push(box(c.cx, sy, Math.min(c.w - 8, 196), 48, `color-mix(in srgb, var(--${cl}) 9%, var(--panel-solid))`, `var(--${cl})`, w.name, sub, selW, `onclick="pick('worker','${esc(w.name)}')"`, toneVar[cl]));
    });
    if (specsByRepo[c.r].length === 0) P.push(`<text x="${c.cx}" y="${ySpec0 + 16}" text-anchor="middle" class="edge-label">no specialists</text>`);
  });
  el("org").innerHTML = `<svg width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}">${defs}${P.join("")}</svg>`;
}

// ── Pipeline board ──────────────────────────────────────────────────────────
function allDispatches(s) {
  const out = [];
  (s.journeys || []).forEach((j) => (j.dispatches || []).forEach((d) => out.push({ ...d, journey: j.id })));
  return out;
}
function renderBoard(s) {
  const disp = allDispatches(s);
  el("pipeCount").textContent = `${(s.journeys || []).length} journeys · ${disp.length} dispatches`;
  el("board").innerHTML = STAGES.map((g) => {
    const cards = disp.filter((d) => stageOf(d.status) === g.key);
    return `<div class="lane"><header><span class="pip bg-${g.cls}"></span>${g.label}<span class="lc">${cards.length}</span></header>
      <div class="cards">${cards.length ? cards.map(pcard).join("") : '<div class="empty">—</div>'}</div></div>`;
  }).join("");
}
function pcard(d) {
  const cls = stageOf(d.status);
  return `<div class="pcard bd-${cls}" onclick="pickDispatch('${esc(d.journey)}','${esc(d.repo)}','${esc(d.specialist)}')">
    <div class="who">${esc(d.specialist)}</div>
    <div class="meta"><span class="repo-tag">${esc(d.repo)}${d.module ? `/${esc(d.module)}` : ""}</span><span>·</span><span>${esc(d.journey)}</span>${d.pr ? `<a href="${esc(d.pr)}" target="_blank" rel="noreferrer">PR ↗</a>` : ""}</div>
  </div>`;
}

// ── Detail panel ────────────────────────────────────────────────────────────
function pick(kind, id) { S.sel = { kind, id }; renderDetail(S.snap); renderOrg(S.snap); if (window.matchMedia("(max-width:899px)").matches) renderMobile(S.snap); }
function pickDispatch(journey, repo, specialist) { S.sel = { kind: "dispatch", journey, repo, specialist }; renderDetail(S.snap); renderMobile(S.snap); }
window.pick = pick; window.pickDispatch = pickDispatch;

function renderDetail(s) {
  const box = el("detail");
  if (!S.sel) { box.innerHTML = `<h3>Detail</h3><div class="sub">Nothing selected</div><p class="hint">Click any node in the org chart, a pipeline card, or a worker in the mobile list — its full detail appears here.</p>`; return; }
  if (S.sel.kind === "coordinator") {
    const c = s.workers.find((w) => w.role === "coordinator");
    box.innerHTML = `<h3>${esc(c ? c.name : "Coordinator")}</h3><div class="sub">coordinator · ${esc(s.context.name)}</div>
      <dl><dt>repos</dt><dd>${esc(s.repos.join(", "))}</dd><dt>team</dt><dd>${s.counts.hired} specialists</dd></dl>
      <div class="hint" style="margin-top:14px">The coordinator decomposes demands and dispatches specialists. It has no worktree of its own.</div>`;
    return;
  }
  if (S.sel.kind === "worker") {
    const w = s.workers.find((x) => x.name === S.sel.id); if (!w) { box.innerHTML = "—"; return; }
    const wts = (s.worktreeRows || []).filter((r) => r.repo === w.repo);
    const disp = allDispatches(s).filter((d) => d.repo === w.repo && d.specialist.toLowerCase() === w.name.toLowerCase());
    box.innerHTML = `<h3>${esc(w.name)}</h3><div class="sub">${esc(w.role)} · ${esc(w.repo || "")}${w.module ? ` · ${esc(w.module)}` : ""}</div>
      <dl><dt>status</dt><dd>${chip(w.status)}</dd>${w.journey ? `<dt>journey</dt><dd>${esc(w.journey)}</dd>` : ""}${w.pr ? `<dt>PR</dt><dd><a href="${esc(w.pr)}" target="_blank" rel="noreferrer">PR ↗</a></dd>` : ""}</dl>
      ${disp.length ? `<div class="section"><h4>Dispatches</h4><div class="mini">${disp.map((d) => `<div class="row">${chip(d.status)}<span>${esc(d.journey)}</span>${d.pr ? `<a href="${esc(d.pr)}" target="_blank" rel="noreferrer">PR ↗</a>` : ""}</div>`).join("")}</div></div>` : ""}
      ${wts.length ? `<div class="section"><h4>Worktrees (${wts.length})</h4><div class="mini">${wts.map((r) => `<div class="row"><span class="mono">${esc(r.branch)}</span></div>`).join("")}</div></div>` : ""}`;
    return;
  }
  if (S.sel.kind === "repo") {
    const info = (s.repoInfos || []).find((r) => r.name === S.sel.id) || { name: S.sel.id, stack: [] };
    const specs = s.workers.filter((w) => w.repo === S.sel.id);
    const rels = (s.relations || []).filter((e) => e.from === S.sel.id || e.to === S.sel.id);
    const skills = (s.toolboxDetail?.skills || []).filter((k) => k.repos.includes(S.sel.id));
    const wts = (s.worktreeRows || []).filter((r) => r.repo === S.sel.id);
    const mods = (s.modules || []).filter((m) => m.repo === S.sel.id && !m.implicit);
    box.innerHTML = `<h3>${esc(info.name)}</h3><div class="sub">${info.stack.length ? esc(info.stack.join(" · ")) : "repo"}${mods.length ? ` · ${mods.length} modules` : ""}</div>
      ${mods.length ? `<div class="section"><h4>Modules</h4><div class="mini">${mods.map((m) => `<div class="row"><b>${esc(m.module)}</b>${m.group !== m.module ? `<span class="chip c-available">${esc(m.group)}</span>` : ""}<span class="mono">${esc(m.stack.join(" · "))}</span></div>`).join("")}</div></div>` : ""}
      <div class="section"><h4>Specialists</h4><div class="mini">${specs.length ? specs.map((w) => `<div class="row">${chip(w.status)}<b>${esc(w.name)}</b><span style="color:var(--ink-dim);font-size:12px">${esc(w.role)}${w.module ? ` · ${esc(w.module)}` : ""}</span></div>`).join("") : '<span class="hint">none hired</span>'}</div></div>
      ${rels.length ? `<div class="section"><h4>Relations</h4><div class="mini">${rels.map((e) => `<div class="row"><span class="mono">${esc(e.from)} → ${esc(e.to)}</span><span class="chip c-available">${esc(e.type)}</span></div>${e.detail ? `<div class="hint" style="margin:-2px 0 4px 2px">${esc(e.detail)}</div>` : ""}`).join("")}</div></div>` : ""}
      ${skills.length ? `<div class="section"><h4>Toolbox</h4><div class="mini">${skills.map((k) => `<div class="row"><b>${esc(k.name)}</b></div><div class="hint" style="margin:-2px 0 2px 2px">${esc(k.whenToUse)}</div>`).join("")}</div></div>` : ""}
      ${wts.length ? `<div class="section"><h4>Worktrees</h4><div class="mini">${wts.map((r) => `<div class="row"><span class="mono">${esc(r.branch)}</span></div>`).join("")}</div></div>` : ""}`;
    return;
  }
  if (S.sel.kind === "dispatch") {
    const j = (s.journeys || []).find((x) => x.id === S.sel.journey);
    const d = j && j.dispatches.find((x) => x.repo === S.sel.repo && x.specialist === S.sel.specialist);
    if (!d) { box.innerHTML = "—"; return; }
    box.innerHTML = `<h3>${esc(d.specialist)}</h3><div class="sub">${esc(d.repo)}${d.module ? `/${esc(d.module)}` : ""} · journey ${esc(j.id)}</div>
      <dl><dt>stage</dt><dd>${chip(d.status)}</dd><dt>branch</dt><dd class="mono">${esc(d.branch)}</dd>${d.worktree ? `<dt>worktree</dt><dd class="mono">${esc(d.worktree)}</dd>` : ""}${d.pr ? `<dt>PR</dt><dd><a href="${esc(d.pr)}" target="_blank" rel="noreferrer">PR ↗</a></dd>` : ""}</dl>
      <div class="section"><h4>Journey ${esc(j.id)}</h4><div class="mini">${j.dispatches.map((x) => `<div class="row">${chip(x.status)}<span class="repo-tag">${esc(x.repo)}${x.module ? `/${esc(x.module)}` : ""}</span><span>${esc(x.specialist)}</span></div>`).join("")}</div></div>`;
    return;
  }
}

// ── Mobile experience ───────────────────────────────────────────────────────
function renderMobile(s) {
  const m = el("mobile"); if (!s) return;
  if (S.tab === "overview") {
    m.innerHTML = `<div class="m-section">${s.repos.map((r) => {
      const specs = s.workers.filter((w) => w.repo === r);
      const info = (s.repoInfos || []).find((x) => x.name === r) || { stack: [] };
      return `<details class="m-repo" open><summary><span class="rname">${esc(r)}</span><span class="stack">${esc(info.stack.join(" · "))}</span><span style="margin-left:auto" class="hint">${specs.length}</span></summary>
        ${specs.length ? specs.map((w) => `<div class="worker" onclick="pick('worker','${esc(w.name)}')">${chip(w.status)}<span class="nm">${esc(w.name)}</span><span class="rl">${esc(w.role)}${w.module ? ` · ${esc(w.module)}` : ""}</span><span style="margin-left:auto" class="hint">${w.journey ? esc(w.journey) : ""}</span></div>`).join("") : '<div class="worker"><span class="hint">no specialists hired</span></div>'}
      </details>`;
    }).join("")}</div>
    ${S.sel ? `<section class="card detail" style="padding:18px" id="mdetail"></section>` : ""}`;
    if (S.sel) el("mdetail") && (el("mdetail").innerHTML = el("detail").innerHTML);
  } else if (S.tab === "org") {
    const coord = s.workers.find((w) => w.role === "coordinator");
    m.innerHTML = `<div class="m-tree"><ul><li><span class="tnode"><span class="chip c-available" style="color:var(--coord)"><span class="pip"></span>${esc(coord ? coord.name : "coordinator")}</span></span>
      <ul>${s.repos.map((r) => {
        const specs = s.workers.filter((w) => w.repo === r);
        return `<li><span class="tnode" onclick="pick('repo','${esc(r)}')"><b>${esc(r)}</b></span>
          <ul>${specs.map((w) => `<li><span class="tnode" onclick="pick('worker','${esc(w.name)}')">${chip(w.status)} ${esc(w.name)}</span></li>`).join("") || '<li class="hint">no specialists</li>'}</ul></li>`;
      }).join("")}</ul></li></ul></div>
      ${S.sel ? `<section class="card detail" style="padding:18px;margin-top:12px" id="mdetail"></section>` : ""}`;
    if (S.sel) el("mdetail") && (el("mdetail").innerHTML = el("detail").innerHTML);
  } else if (S.tab === "pipeline") {
    m.innerHTML = (s.journeys || []).length === 0 ? '<p class="hint">No journeys yet.</p>' :
      (s.journeys || []).map((j) => `<div class="m-section"><h4 style="margin:4px 2px 8px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)">${esc(j.id)}</h4>
        <div class="timeline">${(j.dispatches || []).map((d) => `<div class="ev" onclick="pickDispatch('${esc(j.id)}','${esc(d.repo)}','${esc(d.specialist)}')">
          <div style="display:flex;align-items:center;gap:8px">${chip(d.status)}<b>${esc(d.specialist)}</b><span class="repo-tag">${esc(d.repo)}${d.module ? `/${esc(d.module)}` : ""}</span></div>
          <div class="mono" style="margin-top:2px">${esc(d.branch)}${d.pr ? ` · <a href="${esc(d.pr)}" target="_blank" rel="noreferrer">PR ↗</a>` : ""}</div></div>`).join("")}</div></div>`).join("") +
      (S.sel && S.sel.kind === "dispatch" ? `<section class="card detail" style="padding:18px" id="mdetail"></section>` : "");
    if (S.sel && S.sel.kind === "dispatch") el("mdetail") && (el("mdetail").innerHTML = el("detail").innerHTML);
  } else if (S.tab === "terminal") {
    m.innerHTML = `<p class="hint">The terminal is docked below — tap it to expand and run commands in your workspace.</p>`;
    openTerm(true);
  }
}
el("tabbar").addEventListener("click", (e) => {
  const b = e.target.closest("button[data-tab]"); if (!b) return;
  S.tab = b.dataset.tab;
  [...el("tabbar").children].forEach((x) => x.classList.toggle("on", x === b));
  renderMobile(S.snap);
});

// ── Render orchestration ────────────────────────────────────────────────────
function render() {
  const s = S.snap; if (!s) return;
  if (!s.ok) { el("ctxName").textContent = "not an onboarded workspace"; return; }
  renderTop(s); renderOrg(s); renderBoard(s); renderDetail(s); renderMobile(s);
}

// ── Live: SSE ───────────────────────────────────────────────────────────────
function setConn(state) { el("conn").className = "conn " + state; el("connLabel").textContent = state === "live" ? "live" : state === "down" ? "reconnecting" : "connecting"; }
function connect() {
  const es = new EventSource("/api/stream");
  es.addEventListener("snapshot", (e) => { S.snap = JSON.parse(e.data); setConn("live"); render(); });
  es.onopen = () => setConn("live");
  es.onerror = () => { if (es.readyState === 2) setConn("down"); };
}
fetch("/api/snapshot").then((r) => r.json()).then((s) => { if (!S.snap) { S.snap = s; render(); } }).catch(() => {});
connect();

// ── Terminal (WebSocket) ────────────────────────────────────────────────────
let TW = null;
function openTerm(open) { el("term").className = "term " + (open ? "open" : "closed"); if (open) { connectTerm(); el("termIn").focus(); } }
el("termHead").onclick = () => openTerm(!el("term").classList.contains("open"));
function termWrite(html) { const o = el("termOut"); o.insertAdjacentHTML("beforeend", html); o.scrollTop = o.scrollHeight; }

function ansi(text) {
  text = text.replace(/\x1b\][^\x07\x1b]*(\x07|\x1b\\)/g, "");
  text = text.replace(/\x1b\[[0-9;?]*[A-HJKlh]/g, "");
  let out = "", open = 0;
  const parts = text.split(/(\x1b\[[0-9;]*m)/);
  for (const p of parts) {
    const m = p.match(/^\x1b\[([0-9;]*)m$/);
    if (!m) { out += esc(p); continue; }
    const codes = (m[1] || "0").split(";").filter(Boolean).map(Number);
    if (codes.length === 0 || codes.includes(0)) { out += "</span>".repeat(open); open = 0; continue; }
    out += `<span class="${codes.map((c) => `a-${c}`).join(" ")}">`; open++;
  }
  return out + "</span>".repeat(open);
}
function connectTerm() {
  if (TW && (TW.readyState === 0 || TW.readyState === 1)) return;
  const proto = location.protocol === "https:" ? "wss" : "ws";
  TW = new WebSocket(`${proto}://${location.host}/api/terminal`);
  el("termState").textContent = "connecting…";
  TW.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.t === "ready") { el("termState").textContent = msg.shell + " · " + msg.cwd; el("termPs").textContent = "$"; }
    else if (msg.t === "out") termWrite(ansi(msg.d));
    else if (msg.t === "end") { el("termPs").textContent = "$"; if (msg.code) termWrite(`<span class="a-90">[exit ${msg.code}]</span>\n`); }
    else if (msg.t === "exit") { el("termState").textContent = "shell exited"; }
  };
  TW.onclose = () => { el("termState").textContent = "disconnected"; };
  TW.onerror = () => { el("termState").textContent = "error"; };
}
el("termIn").addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;
  const cmd = e.target.value; e.target.value = "";
  if (!TW || TW.readyState !== 1) { connectTerm(); return; }
  termWrite(`<span class="a-92">$</span> ${esc(cmd)}\n`);
  el("termPs").textContent = "…";
  TW.send(JSON.stringify({ t: "run", d: cmd }));
});
</script>
</body>
</html>
