<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>AIPe Web Console</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2310b981'/%3E%3Ctext x='16' y='22' font-size='17' font-family='monospace' font-weight='700' fill='white' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E" />
<style>
/* ── Tokens ─────────────────────────────────────────────────────────────────
   Emerald "ops" console. True-grey neutrals with a faint green bias, one
   emerald accent used with restraint; status hues (sky/amber/slate) are separate
   from the accent. Both themes are first-class.                                 */
:root {
  --bg: #f4f4f6; --bg-2: #eeeef1;
  --panel: #ffffff; --panel-2: #f6f6f8; --panel-3: #ececef; --raise: #ffffff;
  --ink: #17171b; --ink-2: #52525b; --ink-3: #84848e;
  --line: #e7e7ea; --line-2: #d7d7dc;
  --accent: #059669; --accent-2: #10b981; --accent-ink: #047857; --accent-wash: #ecfdf5;
  --sky: #0284c7; --amber: #b45309; --slate: #64748b; --rose: #e11d48;
  --sky-w: #e0f2fe; --amber-w: #fef3c7; --slate-w: #f1f5f9;
  --shadow-1: 0 1px 2px rgba(16,22,19,.06);
  --shadow-2: 0 1px 3px rgba(16,22,19,.08), 0 8px 24px rgba(16,22,19,.08);
  --shadow-3: 0 12px 32px rgba(16,22,19,.14), 0 2px 8px rgba(16,22,19,.08);
  --radius: 12px; --radius-lg: 16px;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
  --sb: 248px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #101013; --bg-2: #151519;
    --panel: #1a1a1f; --panel-2: #202027; --panel-3: #29292f; --raise: #1d1d23;
    --ink: #ececee; --ink-2: #9c9ca6; --ink-3: #6a6a74;
    --line: rgba(255,255,255,.08); --line-2: rgba(255,255,255,.14);
    --accent: #10b981; --accent-2: #34d399; --accent-ink: #6ee7b7; --accent-wash: rgba(16,185,129,.10);
    --sky: #38bdf8; --amber: #fbbf24; --slate: #94a0ad; --rose: #fb7185;
    --sky-w: rgba(56,189,248,.13); --amber-w: rgba(251,191,36,.13); --slate-w: rgba(148,163,184,.13);
    --shadow-1: 0 1px 2px rgba(0,0,0,.4);
    --shadow-2: 0 2px 6px rgba(0,0,0,.35), 0 12px 32px rgba(0,0,0,.45);
    --shadow-3: 0 16px 44px rgba(0,0,0,.55), 0 4px 12px rgba(0,0,0,.4);
  }
}
:root[data-theme="light"] {
  --bg: #f4f4f6; --bg-2: #eeeef1; --panel: #fff; --panel-2: #f6f6f8; --panel-3: #ececef; --raise:#fff;
  --ink: #17171b; --ink-2: #52525b; --ink-3: #84848e; --line: #e7e7ea; --line-2: #d7d7dc;
  --accent: #059669; --accent-2: #10b981; --accent-ink: #047857; --accent-wash: #ecfdf5;
  --sky: #0284c7; --amber: #b45309; --slate: #64748b; --rose: #e11d48;
  --sky-w: #e0f2fe; --amber-w: #fef3c7; --slate-w: #f1f5f9;
  --shadow-1: 0 1px 2px rgba(16,22,19,.06); --shadow-2: 0 1px 3px rgba(16,22,19,.08), 0 8px 24px rgba(16,22,19,.08); --shadow-3: 0 12px 32px rgba(16,22,19,.14), 0 2px 8px rgba(16,22,19,.08);
}
:root[data-theme="dark"] {
  --bg: #101013; --bg-2: #151519; --panel: #1a1a1f; --panel-2: #202027; --panel-3: #29292f; --raise:#1d1d23;
  --ink: #ececee; --ink-2: #9c9ca6; --ink-3: #6a6a74; --line: rgba(255,255,255,.08); --line-2: rgba(255,255,255,.14);
  --accent: #10b981; --accent-2: #34d399; --accent-ink: #6ee7b7; --accent-wash: rgba(16,185,129,.10);
  --sky: #38bdf8; --amber: #fbbf24; --slate: #94a0ad; --rose: #fb7185;
  --sky-w: rgba(56,189,248,.13); --amber-w: rgba(251,191,36,.13); --slate-w: rgba(148,163,184,.13);
  --shadow-1: 0 1px 2px rgba(0,0,0,.4); --shadow-2: 0 2px 6px rgba(0,0,0,.35), 0 12px 32px rgba(0,0,0,.45); --shadow-3: 0 16px 44px rgba(0,0,0,.55), 0 4px 12px rgba(0,0,0,.4);
}
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; overflow-x: hidden; max-width: 100%; }
body {
  background: var(--bg); color: var(--ink);
  font-family: var(--sans); font-size: 14px; line-height: 1.5;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
.num { font-variant-numeric: tabular-nums; }
.mono { font-family: var(--mono); }
.eyebrow { font-family: var(--mono); font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; }
button { font: inherit; color: inherit; cursor: pointer; border: none; background: none; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 8px; }
@media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
::-webkit-scrollbar { width: 11px; height: 11px; }
::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 8px; border: 3px solid transparent; background-clip: padding-box; }

/* ── App shell ──────────────────────────────────────────────────────────── */
.app { display: grid; grid-template-columns: var(--sb) 1fr; height: 100dvh; }
.app.collapsed { --sb: 68px; }
@keyframes fadeup { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@keyframes slidein { from { opacity: 0; transform: translateX(14px); } to { opacity: 1; transform: none; } }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 color-mix(in srgb, currentColor 50%, transparent); } 70% { box-shadow: 0 0 0 6px transparent; } }

/* Sidebar */
.sidebar { background: var(--panel); border-right: 1px solid var(--line); display: flex; flex-direction: column; gap: 4px; padding: 14px 12px; min-width: 0; }
.brand { display: flex; align-items: center; gap: 11px; padding: 6px 8px 14px; }
.brand .mark { width: 30px; height: 30px; border-radius: 9px; background: linear-gradient(140deg, var(--accent-2), var(--accent)); display: grid; place-items: center; color: #04120c; font-family: var(--mono); font-weight: 800; font-size: 16px; flex: 0 0 auto; box-shadow: 0 4px 14px -4px color-mix(in srgb, var(--accent) 60%, transparent); }
.brand .name { font-weight: 750; letter-spacing: -.02em; font-size: 15px; white-space: nowrap; }
.brand .name small { display: block; font-weight: 500; font-size: 11px; color: var(--ink-3); letter-spacing: 0; }
.app.collapsed .brand .name, .app.collapsed .nav-i span, .app.collapsed .sb-foot .lbl, .app.collapsed .sb-sec { display: none; }
.sb-sec { padding: 14px 10px 6px; }
.nav-i { position: relative; display: flex; align-items: center; gap: 11px; padding: 9px 11px; border-radius: 10px; color: var(--ink-2); font-weight: 550; font-size: 13.5px; width: 100%; text-align: left; transition: background .15s, color .15s; white-space: nowrap; }
.nav-i .ic { width: 18px; height: 18px; flex: 0 0 18px; display: grid; place-items: center; color: var(--ink-3); }
.nav-i:hover { background: var(--panel-2); color: var(--ink); }
.nav-i:hover .ic { color: var(--ink-2); }
.nav-i.on { background: var(--panel-2); color: var(--accent-ink); }
.nav-i.on .ic { color: var(--accent); }
.nav-i.on::before { content: ""; position: absolute; left: 2px; top: 8px; bottom: 8px; width: 3px; border-radius: 3px; background: var(--accent); }
.nav-i .badge { margin-left: auto; font-size: 11px; font-weight: 700; color: var(--amber); background: var(--amber-w); padding: 0 7px; border-radius: 999px; }
.app.collapsed .nav-i { justify-content: center; padding: 9px; }
.app.collapsed .nav-i .badge { display: none; }
.sb-foot { margin-top: auto; display: flex; flex-direction: column; gap: 4px; }

/* Topbar */
.main { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
.topbar { height: 60px; flex: 0 0 60px; display: flex; align-items: center; gap: 14px; padding: 0 22px; border-bottom: 1px solid var(--line); background: color-mix(in srgb, var(--panel) 70%, transparent); backdrop-filter: blur(14px); }
.tb-title { font-weight: 700; font-size: 15px; letter-spacing: -.01em; }
.tb-crumb { color: var(--ink-3); font-size: 13px; }
.cmdk { margin-left: auto; display: inline-flex; align-items: center; gap: 10px; padding: 8px 12px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel-2); color: var(--ink-3); font-size: 13px; min-width: 220px; transition: border-color .15s, background .15s; }
.cmdk:hover { border-color: var(--line-2); }
.kbd { font-family: var(--mono); font-size: 11px; padding: 2px 6px; border-radius: 6px; background: var(--panel-3); border: 1px solid var(--line); color: var(--ink-2); }
.icon-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--line); background: var(--panel-2); display: grid; place-items: center; color: var(--ink-2); transition: border-color .15s, color .15s, transform .1s; }
.icon-btn:hover { border-color: var(--line-2); color: var(--ink); }
.icon-btn:active { transform: scale(.94); }
.langseg { display: inline-flex; padding: 3px; gap: 2px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; }
.langseg button { padding: 5px 9px; border-radius: 7px; font-size: 11px; font-weight: 700; color: var(--ink-3); font-family: var(--mono); letter-spacing: .04em; transition: color .14s, background .14s; }
.langseg button:hover { color: var(--ink-2); }
.langseg button.on { color: #04120c; background: linear-gradient(140deg, var(--accent-2), var(--accent)); }
/* settings */
.set-h { font-weight: 720; font-size: 15px; letter-spacing: -.01em; }
.set-sub-h { font-family: var(--mono); font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-3); margin: 20px 0 4px; }
.srow { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 13px 0; border-top: 1px solid var(--line); }
.srow .stx { min-width: 0; } .srow .stitle { font-weight: 600; font-size: 13.5px; } .srow .sub { font-size: 12.5px; margin-top: 2px; }
.srow .sctl { flex: 0 0 auto; }
.erow { padding: 10px 0; } .erow .stx { display: flex; align-items: center; gap: 10px; }
.edot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
.edot.bg-active { background: var(--sky); } .edot.bg-delivered, .edot.bg-merged { background: var(--accent); } .edot.bg-escalated { background: var(--amber); }
.sw { width: 42px; height: 24px; border-radius: 999px; background: var(--panel-3); border: 1px solid var(--line-2); position: relative; transition: background .16s, border-color .16s; flex: 0 0 auto; }
.sw .knob { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; border: 1px solid rgba(0,0,0,.06); box-shadow: 0 1px 2px rgba(0,0,0,.3); transition: transform .18s cubic-bezier(.32,.72,0,1); }
.sw.on { background: var(--accent); border-color: var(--accent); }
.sw.on .knob { transform: translateX(18px); }
/* org chart (SVG tree) */
.orgwrap { overflow-x: auto; overflow-y: hidden; padding: 10px 6px; }
.orgwrap svg { display: block; }
/* vertical org tree — the mobile-friendly rendering of the organogram */
.org-mobile { display: none; }
.otree { display: flex; flex-direction: column; }
.ot-coord { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border: 1px solid var(--accent); border-radius: 12px; background: color-mix(in srgb, var(--accent) 10%, var(--panel)); }
.ot-dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
.ot-name { font-weight: 720; letter-spacing: -.01em; } .ot-sub { font-size: 11.5px; color: var(--ink-3); }
.ot-branches { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; position: relative; padding-left: 15px; }
.ot-branches::before { content: ""; position: absolute; left: 1px; top: -12px; bottom: 26px; width: 2px; background: var(--line-2); }
.ot-repo { border: 1px solid var(--line); border-radius: 12px; background: var(--panel); overflow: hidden; position: relative; }
.ot-repo::before { content: ""; position: absolute; left: -15px; top: 24px; width: 15px; height: 2px; background: var(--line-2); }
.ot-repo.mono { border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); }
.ot-rhead { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 11px 13px; border-bottom: 1px solid var(--line); background: var(--panel-2); }
.ot-rname { font-weight: 700; }
.ot-kind { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-3); }
.ot-repo.mono .ot-kind { color: var(--accent-ink); }
.ot-people { display: flex; flex-direction: column; }
.ot-person { display: flex; align-items: center; gap: 10px; padding: 9px 13px; border: 0; border-top: 1px solid var(--line); background: transparent; width: 100%; text-align: left; cursor: pointer; }
.ot-person:first-child { border-top: 0; }
.ot-pdot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
.ot-pmeta { display: flex; flex-direction: column; min-width: 0; flex: 1; }
.ot-pname { font-weight: 640; font-size: 13.5px; }
.ot-prole { font-size: 11.5px; color: var(--ink-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.onode { cursor: pointer; }
.onode rect { transition: filter .14s; }
.onode:hover rect { filter: brightness(1.07); }
.olink { fill: none; stroke: var(--line-2); stroke-width: 1.4px; }
.oedge { fill: none; stroke: var(--line-2); stroke-dasharray: 5 5; opacity: .8; }
.oedge-l { fill: var(--ink-3); font-size: 10px; font-weight: 600; letter-spacing: .03em; }
.otitle { font-weight: 650; letter-spacing: -.01em; }
@keyframes odot { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
.odot-active { animation: odot 1.6s ease-in-out infinite; }
.conn { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; color: var(--accent-ink); }
.conn .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); color: var(--accent); animation: pulse 2.6s infinite; }
.conn.down { color: var(--amber); } .conn.down .dot { background: var(--amber); color: var(--amber); animation: none; }
.conn.wait { color: var(--slate); } .conn.wait .dot { background: var(--slate); color: var(--slate); }

/* View area */
.view { flex: 1; overflow: auto; padding: 24px; }
.view-in { max-width: 1180px; margin: 0 auto; animation: fadeup .28s ease both; }
.row { display: flex; align-items: center; gap: 12px; }
.between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
h1.view-h { font-size: 22px; font-weight: 780; letter-spacing: -.02em; margin: 0 0 2px; }
.sub { color: var(--ink-3); font-size: 13.5px; }

/* Cards */
.card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-lg); box-shadow: var(--shadow-1); }
.card.pad { padding: 18px; }
.grid { display: grid; gap: 16px; }

/* Hero status */
.hero { display: flex; align-items: center; gap: 18px; padding: 22px; border-radius: var(--radius-lg); border: 1px solid var(--line); border-left-width: 3px; box-shadow: var(--shadow-2); position: relative; overflow: hidden; background: var(--panel); }
.hero.ok { border-left-color: var(--accent); }
.hero.warn { border-left-color: var(--amber); }
.hero .orb { width: 54px; height: 54px; border-radius: 16px; display: grid; place-items: center; font-size: 24px; flex: 0 0 auto; }
.hero.ok .orb { background: var(--accent-wash); color: var(--accent); }
.hero.warn .orb { background: var(--amber-w); color: var(--amber); }
.hero h2 { margin: 0; font-size: 19px; font-weight: 750; letter-spacing: -.02em; }
.hero p { margin: 2px 0 0; color: var(--ink-2); font-size: 13.5px; }
.hero .cta { margin-left: auto; }

/* KPI */
.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(128px,1fr)); gap: 12px; }
.kpi { padding: 14px 16px; border-radius: var(--radius); border: 1px solid var(--line); background: var(--panel); box-shadow: var(--shadow-1); position: relative; overflow: hidden; }
.kpi .n { font-size: 26px; font-weight: 780; letter-spacing: -.03em; line-height: 1; }
.kpi .k { font-family: var(--mono); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); margin-top: 8px; }
.kpi .spark { position: absolute; right: 0; bottom: 0; left: 0; height: 3px; }
.kpi.sky .n { color: var(--sky); } .kpi.sky .spark { background: var(--sky); }
.kpi.amber .n { color: var(--amber); } .kpi.amber .spark { background: var(--amber); }
.kpi.acc .n { color: var(--accent); } .kpi.acc .spark { background: var(--accent); }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 15px; border-radius: 10px; font-weight: 650; font-size: 13px; border: 1px solid transparent; transition: filter .15s, background .15s, border-color .15s, transform .1s; }
.btn:active { transform: translateY(1px); }
.btn-primary { background: linear-gradient(140deg, var(--accent-2), var(--accent)); color: #04120c; box-shadow: 0 6px 16px -6px color-mix(in srgb, var(--accent) 60%, transparent); }
.btn-primary:hover { filter: brightness(1.05); }
.btn-ghost { background: var(--panel-2); border-color: var(--line); color: var(--ink); }
.btn-ghost:hover { border-color: var(--line-2); }

/* Chips */
.chip { display: inline-flex; align-items: center; gap: 6px; padding: 2px 9px 2px 7px; border-radius: 999px; font-size: 11.5px; font-weight: 650; }
.chip .d { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
.chip.active, .chip.dispatched { color: var(--sky); background: var(--sky-w); } .chip.active .d, .chip.dispatched .d { animation: pulse 2.4s infinite; }
.chip.delivered, .chip.merged { color: var(--accent-ink); background: var(--accent-wash); }
.chip.escalated { color: var(--amber); background: var(--amber-w); }
.chip.available, .chip.idle, .chip.removed { color: var(--slate); background: var(--slate-w); }

/* Activity feed */
.feed { display: flex; flex-direction: column; }
.ev { display: flex; gap: 12px; padding: 12px 4px; border-bottom: 1px solid var(--line); animation: slidein .3s ease both; }
.ev:last-child { border-bottom: none; }
.ev .tl { display: flex; flex-direction: column; align-items: center; padding-top: 3px; }
.ev .tl .d { width: 9px; height: 9px; border-radius: 50%; }
.ev .tx { flex: 1; min-width: 0; }
.ev .tx b { font-weight: 650; }
.ev .tx .m { color: var(--ink-2); font-size: 13px; }
.ev .ts { color: var(--ink-3); font-size: 11.5px; font-family: var(--mono); white-space: nowrap; }
.d-active { background: var(--sky); } .d-delivered, .d-merged { background: var(--accent); } .d-escalated { background: var(--amber); } .d-idle { background: var(--slate); }

/* Kanban */
.board { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
.lane { background: var(--panel-2); border: 1px solid var(--line); border-radius: var(--radius); display: flex; flex-direction: column; }
.lane > h4 { margin: 0; padding: 11px 13px; font-family: var(--mono); font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-2); display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--line); }
.lane > h4 .d { width: 8px; height: 8px; border-radius: 50%; }
.lane > h4 .c { margin-left: auto; color: var(--ink-3); background: var(--panel-3); border-radius: 999px; padding: 0 8px; }
.lane .body { padding: 11px; display: flex; flex-direction: column; gap: 10px; min-height: 40px; }
.tk { position: relative; background: var(--panel); border: 1px solid var(--line); border-radius: 11px; padding: 12px 12px 12px 16px; cursor: pointer; box-shadow: var(--shadow-1); transition: transform .14s, box-shadow .14s, border-color .14s; }
.tk::before { content: ""; position: absolute; left: 0; top: 11px; bottom: 11px; width: 3px; border-radius: 3px; background: var(--line-2); }
.tk.stg-dispatched::before { background: var(--sky); } .tk.stg-delivered::before, .tk.stg-merged::before { background: var(--accent); } .tk.stg-escalated::before { background: var(--amber); }
.tk:hover { transform: translateY(-2px); box-shadow: var(--shadow-2); border-color: var(--line-2); }
.tk .who { font-weight: 680; letter-spacing: -.01em; }
.tk .meta { display: flex; gap: 6px; align-items: center; margin-top: 6px; flex-wrap: wrap; color: var(--ink-3); font-size: 12px; }
.tag { font-family: var(--mono); font-size: 11px; color: var(--ink-2); background: var(--panel-3); padding: 1px 7px; border-radius: 6px; }

/* Table */
.tbl { width: 100%; border-collapse: collapse; }
.tbl th { text-align: left; font-family: var(--mono); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; padding: 10px 14px; border-bottom: 1px solid var(--line); }
.tbl td { padding: 12px 14px; border-bottom: 1px solid var(--line); font-size: 13.5px; }
.tbl tr { cursor: pointer; }
.tbl tbody tr:hover { background: var(--panel-2); }
.tbl tbody tr:last-child td { border-bottom: none; }

.cvid { flex: 1; min-width: 0; }

.cvstats { display: flex; gap: 16px; margin-top: 2px; padding-top: 11px; border-top: 1px solid var(--line); }
.cvstat { font-size: 11.5px; color: var(--ink-3); display: flex; gap: 5px; align-items: baseline; }

.lg-line { width: 16px; height: 0; border-top: 2px dashed var(--slate); flex: 0 0 auto; }

.frow:first-child { border-top: none; }
.fp { font-size: 12px; color: var(--ink-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }

.fbar { display: inline-flex; gap: 2px; margin-left: 8px; vertical-align: middle; }
.fbar i { width: 6px; height: 6px; border-radius: 1px; display: inline-block; }
.fbar .a { background: var(--accent); } .fbar .d { background: var(--rose); } .fbar .n { background: var(--line-2); }

/* Org */
.org-repo { border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); overflow: hidden; }
.org-repo > header { padding: 13px 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--line); background: var(--panel-2); }

.org-mod { padding: 12px 15px; border-bottom: 1px solid var(--line); }

/* Drawer */

#overlay { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 40; }
.scrim { position: absolute; inset: 0; background: rgba(4,8,6,.5); backdrop-filter: blur(3px); opacity: 0; pointer-events: none; transition: opacity .2s; }

.cmd-scrim { position: fixed; inset: 0; background: rgba(4,8,6,.55); backdrop-filter: blur(4px); display: none; align-items: flex-start; justify-content: center; padding-top: 12vh; z-index: 60; }

.opt.sel, .opt:hover { background: var(--accent-wash); color: var(--accent-ink); }

function setSnap(s){
  DATA.ok = !!s.ok;

    const mods = (s.packages||[]).filter(m=>m.repo===name && !m.implicit).map(m=>({ name:m.module, stack:m.stack||[], kind:m.kind||"", group: m.group!==m.module ? m.group : undefined }));
    return { name, stack: info.stack||[], kind: info.kind||"", packages: mods };
  });
  DATA.workers = (s.workers||[]).filter(w=>w.role!=="coordinator").map(w=>({ name:w.name, role:w.role, repo:w.repo, module:w.module||null, status:w.status, journey:w.journey, pr:w.pr }));

  DATA.packages = s.packages||[];

}

function evMsg(d){
  const j = d.journey ? " · "+d.journey : "";
  if (d.status==="dispatched") return `dispatched to ${fqidOf(d)}${j}`;
  if (d.status==="delivered") return `delivered${d.pr?" · PR":""}${j}`;
  if (d.status==="escalated") return `escalated${j}`;
  if (d.status==="merged") return `merged${j}`;
  if (d.status==="removed") return `worktree removed${j}`;
  return `${d.status}${j}`;
}
function diffActivity(){
  const now = Date.now();
  const cur = new Map(); dispatches.forEach(d=> cur.set(DKEY(d), d));
  if (PREV === null){
    DATA.activity = dispatches.slice().reverse().map(d=>({ w:d.specialist, status:d.status, m:evMsg(d), at:now }));
  } else {
    cur.forEach((d,k)=>{
      const p = PREV.get(k);
      if (!p || p.status!==d.status || p.pr!==d.pr){
        DATA.activity.unshift({ w:d.specialist, status:d.status, m:evMsg(d), at:now });
        const key = { dispatched:"dispatch", delivered:"delivered", escalated:"escalated", merged:"merged", removed:null }[d.status];
        if (key && NOTIF.ev[key]) notify(d.status, "AIPe · "+d.specialist, evMsg(d));
      }
    });
    if (DATA.activity.length > 60) DATA.activity.length = 60;
  }
  PREV = cur;
}

let AC = null;
function beep(kind){
  try {
    AC = AC || new (window.AudioContext || window.webkitAudioContext)();
    const tones = kind==="escalated" ? [880,660,880] : kind==="merged"||kind==="delivered" ? [660,880] : [740];
    tones.forEach((f,i)=>{ const o=AC.createOscillator(), g=AC.createGain(); o.type="sine"; o.frequency.value=f;
      const s=AC.currentTime+i*0.11; g.gain.setValueAtTime(0,s); g.gain.linearRampToValueAtTime(0.14,s+0.02); g.gain.exponentialRampToValueAtTime(0.0001,s+0.16);
      o.connect(g); g.connect(AC.destination); o.start(s); o.stop(s+0.18); });
  } catch(e){}
}
const NOTE_ICON = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2310b981'/%3E%3Ctext x='16' y='22' font-size='17' font-family='monospace' font-weight='700' fill='white' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E";
function notify(kind, title, body){
  if (!NOTIF.enabled) return;
  if (NOTIF.sound) beep(kind);
  if (NOTIF.desktop && "Notification" in window && Notification.permission==="granted") {
    try { new Notification(title, { body, icon: NOTE_ICON, tag: "aipe-"+kind }); } catch(e){}
  }
}

// The live organogram: coordinator hub → repo clusters → specialist nodes,
// colored by state (active pulses), over the cross-repo relation edges. Redrawn
// whenever the snapshot changes, so status shifts appear in real time.
function orgColor(st){ return st==="active"?"var(--sky)":st==="delivered"?"var(--accent)":st==="escalated"?"var(--amber)":"var(--slate)"; }
function renderOrgSvg(){
  const repos = DATA.repos.map(r=>r.name);
  const yC=42, yR=152, yS0=262, sH=64, pkgH=28, grpGap=14, colW=212, gap=34;
  // Per repo, group specialists by package (w.module); "" = repo-level. Each
  // package becomes a labelled cluster, so a monorepo's units are visually
  // separated instead of one flat stack under the repo.
  const colsData = repos.map(r=>{
    const info = DATA.repos.find(x=>x.name===r);
    const mono = !!(info.packages && info.packages.length>0);
    const g = new Map();
    DATA.workers.filter(w=>w.repo===r).forEach(w=>{ const k=w.module||""; if(!g.has(k)) g.set(k,[]); g.get(k).push(w); });
    const rows=[]; let y=yS0;
    for(const [pkg, ws] of g){
      if(pkg){ rows.push({type:"pkg",label:pkg,y}); y+=pkgH; }
      ws.forEach(w=>{ rows.push({type:"spec",w,y}); y+=sH; });
      y+=grpGap;
    }
    return { r, info, mono, rows, botY:y };
  });
  let x=24; const cols=[];
  colsData.forEach(cd=>{ cols.push(Object.assign({}, cd, {x, cx:x+colW/2})); x+=colW+gap; });
  const totalW=Math.max(560,x+24);
  const totalH=Math.max(yS0, ...cols.map(c=>c.botY))+16;
  const cxAll=totalW/2, P=[];
  DATA.relations.forEach(e=>{ const a=cols.find(c=>c.r===e.from), b=cols.find(c=>c.r===e.to); if(!a||!b)return;
    const y=yR-10, mid=(a.cx+b.cx)/2, lift=44+Math.abs(a.cx-b.cx)*0.05;
    P.push(`<path class="oedge" d="M ${a.cx} ${y} Q ${mid} ${y-lift} ${b.cx} ${y}"/>`);
    P.push(`<text class="oedge-l" x="${mid}" y="${y-lift+3}" text-anchor="middle">${esc(e.type)}</text>`); });
  cols.forEach(c=>{ P.push(`<path class="olink" d="M ${cxAll} ${yC+22} C ${cxAll} ${yR}, ${c.cx} ${yR}, ${c.cx} ${yR-14}"/>`);
    c.rows.forEach(row=>{ P.push(`<path class="olink" d="M ${c.cx} ${yR+34} L ${c.cx} ${row.y-2}"/>`); }); });
  const node=(cx,y,w,h,fill,stroke,label,sub,click,tone,pulse)=>{ const x0=cx-w/2; return `<g class="onode" ${click} tabindex="0">
    <rect x="${x0}" y="${y}" width="${w}" height="${h}" rx="12" fill="${fill}" stroke="${stroke}" stroke-width="1.4"/>
    ${tone?`<circle class="${pulse?'odot-active':''}" cx="${x0+14}" cy="${y+h/2}" r="4.5" fill="${tone}"/>`:""}
    <text class="otitle" x="${cx+(tone?7:0)}" y="${y+(sub?21:h/2+4)}" text-anchor="middle" fill="var(--ink)" font-size="13">${esc(label)}</text>
    ${sub?`<text x="${cx+(tone?7:0)}" y="${y+37}" text-anchor="middle" fill="var(--ink-3)" font-size="11">${esc(sub)}</text>`:""}</g>`; };
  P.push(node(cxAll,yC,208,44,"color-mix(in srgb, var(--accent) 11%, var(--panel))","var(--accent)",DATA.context.coordinator||"coordinator","coordinator","",'var(--accent)',false));
  cols.forEach(c=>{
    const cat = c.info.kind || "";
    const rsub = c.mono ? (cat ? `${t("t_monorepo")} · ${cat}` : t("t_monorepo")) : (cat || t("t_repo"));
    P.push(node(c.cx,yR-14,colW-12,48,"var(--panel-2)",c.mono?"var(--accent)":"var(--line-2)",c.r,rsub,"", c.mono?"var(--accent)":"",false));
    if(c.rows.length===0) P.push(`<text x="${c.cx}" y="${yS0+14}" text-anchor="middle" class="oedge-l">${t("nospec")}</text>`);
    c.rows.forEach(row=>{
      if(row.type==="pkg"){
        const x0=c.cx-(colW-12)/2;
        P.push(`<g class="onode"><rect x="${x0}" y="${row.y}" width="${colW-12}" height="${pkgH-6}" rx="8" fill="color-mix(in srgb, var(--accent) 7%, var(--panel-2))" stroke="var(--accent)" stroke-opacity="0.5" stroke-dasharray="3 3" stroke-width="1"/><text class="otitle" x="${c.cx}" y="${row.y+15}" text-anchor="middle" fill="var(--ink-2)" font-size="11">${esc(row.label)}</text></g>`);
      } else {
        const w=row.w, col=orgColor(w.status);
        P.push(node(c.cx,row.y,colW-12,48,`color-mix(in srgb, ${col} 8%, var(--panel))`,col,w.name,w.role,`onclick="openWorker('${esc(w.name)}')"`,col,w.status==="active"));
      }
    });
  });
  return `<svg width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}">${P.join("")}</svg>`;
}

// Pan + zoom for the org chart: wheel zooms toward the cursor, drag pans,
// double-click resets. Clicks on a specialist node still open their CV (drag is
// suppressed when the pointer starts on a clickable node).
let _orgZ = {s:1,x:0,y:0};
function initOrgPanZoom(){
  const wrap = document.getElementById("orgwrap"); if(!wrap) return;
  const svg = wrap.querySelector("svg"); if(!svg) return;
  // keep the current zoom/pan across live re-renders (don't reset on every tick)
  wrap.style.overflow="hidden"; wrap.style.cursor="grab"; wrap.style.touchAction="none";
  svg.style.transformOrigin="0 0";
  const apply=()=>{ svg.style.transform=`translate(${_orgZ.x}px,${_orgZ.y}px) scale(${_orgZ.s})`; };
  apply();
  wrap.onwheel=(e)=>{ e.preventDefault(); const r=wrap.getBoundingClientRect(); const mx=e.clientX-r.left, my=e.clientY-r.top;
    const ns=Math.min(3,Math.max(0.3,_orgZ.s*Math.exp(-e.deltaY*0.0015))), k=ns/_orgZ.s;
    _orgZ.x=mx-(mx-_orgZ.x)*k; _orgZ.y=my-(my-_orgZ.y)*k; _orgZ.s=ns; apply(); };
  let drag=null;
  wrap.onpointerdown=(e)=>{ if(e.target.closest(".onode[onclick]"))return; drag={x:e.clientX,y:e.clientY,ox:_orgZ.x,oy:_orgZ.y}; wrap.style.cursor="grabbing"; try{wrap.setPointerCapture(e.pointerId)}catch(_){} };
  wrap.onpointermove=(e)=>{ if(!drag)return; _orgZ.x=drag.ox+(e.clientX-drag.x); _orgZ.y=drag.oy+(e.clientY-drag.y); apply(); };
  wrap.onpointerup=()=>{ drag=null; wrap.style.cursor="grab"; };
  wrap.ondblclick=()=>{ _orgZ={s:1,x:0,y:0}; apply(); };
}

// ── Realtime: the snapshot is the single source of truth; SSE pushes each new
//    one as `.aipe/` changes. setSnap() re-derives state (diffing dispatches to
//    emit activity events + notifications), then we re-render the current view.
function setConn(state){
  const el = $("#conn"), lbl = $("#connLabel"); if(!el) return;
  el.classList.remove("down","wait");
  if (state==="live") lbl.textContent = t("live");
  else if (state==="wait"){ el.classList.add("wait"); lbl.textContent = t("conn_wait"); }
  else { el.classList.add("down"); lbl.textContent = t("conn_down"); }
}
function liveRender(){
  // A full snapshot arrived — re-render whatever view is on screen so the
  // organogram, KPIs, board, feed and workers all reflect the new state.
  if (CUR) go(CUR);
}
async function boot(){
  applyI18n();
  setConn("wait");
  try {
    const r = await fetch("api/snapshot", { cache:"no-store" });
    if (r.ok){ setSnap(await r.json()); }
  } catch(e){}
  go(CUR);
  connectSSE();
}
let ES = null;
function connectSSE(){
  try {
    ES = new EventSource("api/stream");
    ES.onopen = () => setConn("live");
    // The server sends named `snapshot` events (heartbeats are SSE comments the
    // browser drops silently), so listen for that event specifically.
    ES.addEventListener("snapshot", (m) => {
      if (!m.data) return;
      let s; try { s = JSON.parse(m.data); } catch(e){ return; }
      setSnap(s); setConn("live"); liveRender();
    });
    ES.onerror = () => { if (ES && ES.readyState===2) setConn("down"); };
  } catch(e){ setConn("down"); }
}

// ── Embedded terminal over WebSocket (/api/terminal) ─────────────────────────
//    A persistent shell session on the host running `aipe serve`. Command in,
//    streamed output out; each turn ends with an exit code. Zero deps.
let WS = null, termReady = false, termBusy = false;
function termSet(state, label){ const el=$("#termState"); if(!el) return; el.className="tstate mono"+(state?" "+state:""); el.textContent=label; }
function termWrite(txt, cls){
  const out = $("#termOut"); if(!out) return;
  const node = document.createElement("span"); if(cls) node.className=cls; node.textContent=txt;
  out.appendChild(node); out.scrollTop = out.scrollHeight;
}
function connectTerm(){
  if (WS && (WS.readyState===0 || WS.readyState===1)) return; // already connecting/open
  termReady = false; termSet("", t("term_connecting"));
  const proto = location.protocol==="https:" ? "wss:" : "ws:";
  try { WS = new WebSocket(`${proto}//${location.host}/api/terminal`); }
  catch(e){ termSet("down", t("term_off")); return; }
  WS.onmessage = (ev) => {
    let m; try { m = JSON.parse(ev.data); } catch(e){ return; }
    if (m.t==="ready"){ termReady=true; termBusy=false; const ps=$("#termPs"); if(ps) ps.textContent=(m.shell||"$"); termSet("ok", t("term_ready")); }
    else if (m.t==="out"){ termWrite(m.d); }
    else if (m.t==="end"){ termBusy=false; termSet("ok", "exit "+m.code); const inp=$("#termIn"); if(inp) inp.disabled=false; }
    else if (m.t==="exit"){ termReady=false; termSet("down", t("term_off")); }
  };
  WS.onclose = () => { termReady=false; termBusy=false; termSet("down", t("term_off")); };
  WS.onerror = () => { termSet("down", t("term_off")); };
}
function termRun(cmd){
  if (!termReady || !WS || WS.readyState!==1){ connectTerm(); return; }
  if (termBusy) return;
  termWrite("\n$ "+cmd+"\n", "cmd");
  termBusy = true; const inp=$("#termIn"); if(inp) inp.disabled=true;
  termSet("ok", t("term_running"));
  WS.send(JSON.stringify({ t:"run", d:cmd }));
}
// The terminal input lives inside re-rendered views, so bind via delegation once.
document.addEventListener("keydown",(e)=>{
  const inp = e.target;
  if (inp && inp.id==="termIn" && e.key==="Enter"){
    e.preventDefault(); const v=inp.value.trim(); if(!v) return;
    inp.value=""; termRun(v);
  }
});

// ── Apply language to static chrome + wire the EN/PT toggle ─────────────────
function applyI18n(){
  document.documentElement.lang = LANG;
  $$("[data-t]").forEach(el => el.textContent = t(el.dataset.t));
  const inp = $("#cmdInput"); if (inp) inp.placeholder = t("cmd_ph");
  $$("#langSeg button").forEach(b => b.classList.toggle("on", b.dataset.lang===LANG));
}
$("#langSeg").addEventListener("click", (e) => {
  const b = e.target.closest("button[data-lang]"); if(!b) return;
  LANG = b.dataset.lang; localStorage.setItem("aipe-lang", LANG);
  applyI18n(); go(CUR);
});
applyI18n();
boot();
</script>
