<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>AIPe Web Console</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%236c4cf1'/%3E%3Ctext x='16' y='22' font-size='17' font-family='monospace' fill='white' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E" />
<style>
/* ── Design system ─────────────────────────────────────────────────────────
   One coherent, theme-aware system. Status semantics match the TUI:
   active=blue, delivered=green, escalated=amber, available=muted,
   coordinator=violet. Light and dark are both first-class.                    */
:root {
  color-scheme: light dark;
  --bg: #f6f7fb;
  --panel: #ffffff;
  --panel-2: #f0f1f7;
  --ink: #1a1c25;
  --ink-dim: #5b606f;
  --ink-faint: #8b90a0;
  --line: #e2e4ee;
  --line-strong: #cdd0dd;
  --accent: #6c4cf1;
  --active: #2f76e6;
  --delivered: #1f9d57;
  --escalated: #d98a12;
  --available: #9aa0b0;
  --coord: #7d3ff0;
  --shadow: 0 1px 2px rgba(20,22,35,.06), 0 8px 24px rgba(20,22,35,.06);
  --radius: 14px;
  --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
:root[data-theme="dark"], :root:not([data-theme="light"]) {
  --bg: #0c0d12;
  --panel: #14161e;
  --panel-2: #1b1e28;
  --ink: #eceef6;
  --ink-dim: #a3a9bb;
  --ink-faint: #6b7080;
  --line: #262a37;
  --line-strong: #333849;
  --accent: #8f77ff;
  --active: #5aa0ff;
  --delivered: #35c47b;
  --escalated: #f2b23c;
  --available: #6f7688;
  --coord: #a98bff;
  --shadow: 0 1px 2px rgba(0,0,0,.4), 0 10px 30px rgba(0,0,0,.35);
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) {
    --bg: #f6f7fb; --panel: #fff; --panel-2: #f0f1f7; --ink: #1a1c25;
    --ink-dim: #5b606f; --ink-faint: #8b90a0; --line: #e2e4ee; --line-strong: #cdd0dd;
    --accent: #6c4cf1; --active: #2f76e6; --delivered: #1f9d57; --escalated: #d98a12;
    --available: #9aa0b0; --coord: #7d3ff0;
    --shadow: 0 1px 2px rgba(20,22,35,.06), 0 8px 24px rgba(20,22,35,.06);
  }
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0; background: var(--bg); color: var(--ink);
  font-family: var(--sans); font-size: 14px; line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font: inherit; color: inherit; cursor: pointer; }

/* ── Top bar ─────────────────────────────────────────────────────────────── */
.topbar {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  padding: 12px 18px; background: var(--panel);
  border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 30;
}
.brand { display: flex; align-items: baseline; gap: 10px; }
.brand b { font-size: 16px; letter-spacing: .2px; }
.brand .ctx { color: var(--accent); font-weight: 700; }
.brand .coord { color: var(--ink-dim); font-size: 12.5px; }
.kpis { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }
.kpi {
  display: flex; align-items: baseline; gap: 5px; padding: 4px 10px;
  background: var(--panel-2); border: 1px solid var(--line); border-radius: 999px;
  font-size: 12px; color: var(--ink-dim); white-space: nowrap;
}
.kpi b { font-size: 13px; color: var(--ink); font-variant-numeric: tabular-nums; }
.kpi.s-active b { color: var(--active); }
.kpi.s-delivered b { color: var(--delivered); }
.kpi.s-escalated b { color: var(--escalated); }
.kpi.s-available b { color: var(--available); }
.tb-actions { display: flex; align-items: center; gap: 8px; }
.conn { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-dim); }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--available); }
.conn.live .dot { background: var(--delivered); box-shadow: 0 0 0 3px color-mix(in srgb, var(--delivered) 25%, transparent); }
.conn.down .dot { background: var(--escalated); }
.icon-btn {
  background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px;
  width: 34px; height: 34px; display: grid; place-items: center; font-size: 15px;
}
.icon-btn:hover { border-color: var(--line-strong); }

/* ── Layout: desktop cockpit ───────────────────────────────────────────────
   grid → [main org+pipeline | detail], terminal drawer docked at the bottom.  */
.shell { display: flex; flex-direction: column; height: calc(100dvh - 59px); }
.cockpit {
  display: grid; grid-template-columns: 1fr 340px; gap: 14px;
  padding: 14px; overflow: hidden; flex: 1; min-height: 0;
}
.main-col { display: flex; flex-direction: column; gap: 14px; min-width: 0; overflow: auto; }
.side-col { overflow: auto; min-height: 0; }
.card {
  background: var(--panel); border: 1px solid var(--line);
  border-radius: var(--radius); box-shadow: var(--shadow);
}
.card > h2 {
  margin: 0; padding: 12px 16px; font-size: 12px; letter-spacing: .12em;
  text-transform: uppercase; color: var(--ink-faint); border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 8px;
}
.card > h2 .count { margin-left: auto; color: var(--ink-dim); letter-spacing: 0; text-transform: none; font-weight: 600; }

/* ── Org chart (SVG) ───────────────────────────────────────────────────────*/
.org-wrap { overflow: auto; padding: 6px; }
.org svg { display: block; }
.node-box { cursor: pointer; }
.node-box rect { transition: filter .12s; }
.node-box:hover rect { filter: brightness(1.06); }
.node-box.sel rect { stroke-width: 2.5px; }
.edge { fill: none; stroke: var(--line-strong); stroke-dasharray: 4 4; opacity: .8; }
.edge-label { fill: var(--ink-faint); font-size: 10px; }
.link { fill: none; stroke: var(--line-strong); }

/* ── Pipeline board (kanban) ───────────────────────────────────────────────*/
.board { display: flex; gap: 12px; padding: 12px; overflow-x: auto; }
.lane { flex: 1 0 190px; min-width: 190px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; display: flex; flex-direction: column; }
.lane > header { padding: 9px 12px; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-dim); display: flex; gap: 8px; align-items: center; border-bottom: 1px solid var(--line); }
.lane > header .pip { width: 8px; height: 8px; border-radius: 50%; }
.lane .cards { padding: 10px; display: flex; flex-direction: column; gap: 8px; min-height: 30px; }
.pcard { background: var(--panel); border: 1px solid var(--line); border-left: 3px solid var(--available); border-radius: 10px; padding: 9px 11px; cursor: pointer; }
.pcard:hover { border-color: var(--line-strong); }
.pcard .who { font-weight: 600; font-size: 13px; }
.pcard .meta { color: var(--ink-dim); font-size: 12px; display: flex; gap: 6px; align-items: center; margin-top: 2px; }
.pcard .repo-tag { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }
.empty { color: var(--ink-faint); font-size: 12.5px; padding: 6px 2px; }

/* status accents (shared) */
.s-active { color: var(--active); } .bd-active { border-left-color: var(--active); } .bg-active { background: var(--active); }
.s-delivered { color: var(--delivered); } .bd-delivered { border-left-color: var(--delivered); } .bg-delivered { background: var(--delivered); }
.s-escalated { color: var(--escalated); } .bd-escalated { border-left-color: var(--escalated); } .bg-escalated { background: var(--escalated); }
.s-available { color: var(--available); } .bd-available { border-left-color: var(--available); } .bg-available { background: var(--available); }
.s-merged { color: var(--delivered); } .bd-merged { border-left-color: var(--delivered); } .bg-merged { background: var(--delivered); }
.s-removed { color: var(--ink-faint); } .bd-removed { border-left-color: var(--ink-faint); } .bg-removed { background: var(--ink-faint); }

.chip { display: inline-flex; align-items: center; gap: 5px; padding: 1px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; border: 1px solid currentColor; }
.chip .pip { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

/* ── Detail panel ──────────────────────────────────────────────────────────*/
.detail h3 { margin: 0 0 2px; font-size: 16px; }
.detail .sub { color: var(--ink-dim); font-size: 12.5px; margin-bottom: 12px; }
.detail dl { margin: 0; display: grid; grid-template-columns: auto 1fr; gap: 6px 12px; }
.detail dt { color: var(--ink-faint); font-size: 12px; }
.detail dd { margin: 0; font-size: 12.5px; word-break: break-word; }
.detail .section { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line); }
.detail .section h4 { margin: 0 0 8px; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-faint); }
.mini { display: flex; flex-direction: column; gap: 7px; }
.mini .row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
.mono { font-family: var(--mono); font-size: 11.5px; color: var(--ink-dim); }
.hint { color: var(--ink-faint); font-size: 12.5px; }

/* ── Terminal drawer ───────────────────────────────────────────────────────*/
.term {
  border-top: 1px solid var(--line); background: var(--panel);
  display: flex; flex-direction: column; transition: height .16s ease;
  overflow: hidden;
}
.term.closed { height: 42px; }
.term.open { height: 300px; }
.term header {
  height: 42px; flex: 0 0 42px; display: flex; align-items: center; gap: 10px;
  padding: 0 14px; cursor: pointer; user-select: none; border-bottom: 1px solid transparent;
}
.term.open header { border-bottom-color: var(--line); }
.term header b { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-dim); }
.term header .tstate { font-size: 11.5px; color: var(--ink-faint); font-family: var(--mono); }
.term header .chev { margin-left: auto; color: var(--ink-faint); transition: transform .16s; }
.term.open header .chev { transform: rotate(180deg); }
.term-body { flex: 1; min-height: 0; display: flex; flex-direction: column; }
.term-out {
  flex: 1; overflow: auto; margin: 0; padding: 10px 14px; white-space: pre-wrap; word-break: break-word;
  font-family: var(--mono); font-size: 12.5px; line-height: 1.5; color: var(--ink);
  background: color-mix(in srgb, var(--panel) 82%, #000 18%);
}
:root[data-theme="light"] .term-out, .term-out { background: color-mix(in srgb, var(--panel) 92%, #000 8%); }
.term-inline { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-top: 1px solid var(--line); }
.term-inline .ps { color: var(--delivered); font-family: var(--mono); font-size: 12.5px; }
.term-inline input {
  flex: 1; background: transparent; border: none; outline: none; color: var(--ink);
  font-family: var(--mono); font-size: 12.5px;
}
.a-1{font-weight:700}.a-2{opacity:.7}.a-3{font-style:italic}.a-4{text-decoration:underline}
.a-30{color:#555}.a-31{color:#e06c75}.a-32{color:#98c379}.a-33{color:#e5c07b}
.a-34{color:#61afef}.a-35{color:#c678dd}.a-36{color:#56b6c2}.a-37{color:#dcdfe4}
.a-90{color:var(--ink-faint)}.a-91{color:#e06c75}.a-92{color:#98c379}.a-93{color:#e5c07b}
.a-94{color:#61afef}.a-95{color:#c678dd}.a-96{color:#56b6c2}.a-97{color:var(--ink)}

/* ── Mobile ────────────────────────────────────────────────────────────────*/
.mobile { display: none; }
.tabbar { display: none; }
@media (max-width: 899px) {
  .cockpit { display: none; }
  .desktop-only { display: none; }
  .mobile { display: block; padding: 12px; padding-bottom: 76px; overflow: auto; flex: 1; }
  .shell { height: calc(100dvh - 0px); }
  .tabbar {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
    background: var(--panel); border-top: 1px solid var(--line);
    padding: 6px 6px calc(6px + env(safe-area-inset-bottom));
  }
  .tabbar button {
    background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 5px 0; font-size: 10.5px; color: var(--ink-faint); border-radius: 10px;
  }
  .tabbar button .ic { font-size: 17px; }
  .tabbar button.on { color: var(--accent); background: var(--panel-2); }
  .kpis { width: 100%; margin-left: 0; }
  .topbar { padding: 10px 14px; }
  .m-section { margin-bottom: 14px; }
  .m-repo { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; margin-bottom: 10px; box-shadow: var(--shadow); }
  .m-repo > summary { list-style: none; padding: 12px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .m-repo > summary::-webkit-details-marker { display: none; }
  .m-repo > summary .rname { font-weight: 700; }
  .m-repo > summary .stack { color: var(--ink-faint); font-size: 11px; font-family: var(--mono); }
  .m-repo .worker { padding: 10px 14px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
  .m-repo .worker .nm { font-weight: 600; }
  .m-repo .worker .rl { color: var(--ink-dim); font-size: 12px; }
  .timeline { position: relative; padding-left: 20px; }
  .timeline .ev { position: relative; padding: 8px 0; }
  .timeline .ev::before { content: ""; position: absolute; left: -14px; top: 14px; width: 9px; height: 9px; border-radius: 50%; background: var(--available); }
  .timeline::before { content: ""; position: absolute; left: -10px; top: 4px; bottom: 4px; width: 2px; background: var(--line); }
  .term.open { height: 62vh; }
  .m-tree ul { list-style: none; margin: 0; padding-left: 16px; }
  .m-tree > ul { padding-left: 0; }
  .m-tree li { padding: 3px 0; }
  .m-tree .tnode { display: inline-flex; align-items: center; gap: 8px; }
}
@media (min-width: 900px) { .m-only { display: none; } }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <b>AIPe</b><span class="ctx" id="ctxName">—</span>
    <span class="coord" id="coordName"></span>
  </div>
  <div class="kpis" id="kpis"></div>
  <div class="tb-actions">
    <div class="conn" id="conn"><span class="dot"></span><span id="connLabel">connecting</span></div>
    <button class="icon-btn" id="themeBtn" title="Toggle theme">◐</button>
  </div>
</div>

<div class="shell">
  <!-- Desktop cockpit -->
  <div class="cockpit desktop-only">
    <div class="main-col">
      <section class="card">
        <h2>Organograma <span class="count" id="orgCount"></span></h2>
        <div class="org-wrap org" id="org"></div>
      </section>
      <section class="card">
        <h2>Pipeline <span class="count" id="pipeCount"></span></h2>
        <div class="board" id="board"></div>
      </section>
    </div>
    <aside class="side-col">
      <section class="card detail" style="padding:16px" id="detail"></section>
    </aside>
  </div>

  <!-- Mobile experience -->
  <div class="mobile m-only" id="mobile"></div>

  <!-- Terminal drawer (shared) -->
  <div class="term closed" id="term">
    <header id="termHead">
      <b>Terminal</b>
      <span class="tstate" id="termState">disconnected</span>
      <span class="chev">▲</span>
    </header>
    <div class="term-body">
      <pre class="term-out" id="termOut"></pre>
      <div class="term-inline">
        <span class="ps" id="termPs">$</span>
        <input id="termIn" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="run a command… (aipe, git, bun test)" />
      </div>
    </div>
  </div>
</div>

<nav class="tabbar m-only" id="tabbar">
  <button data-tab="overview" class="on"><span class="ic">▤</span>Overview</button>
  <button data-tab="org"><span class="ic">◈</span>Org</button>
  <button data-tab="pipeline"><span class="ic">▦</span>Pipeline</button>
  <button data-tab="terminal"><span class="ic">›_</span>Terminal</button>
</nav>

<script>
"use strict";
// ── State ──────────────────────────────────────────────────────────────────
const S = { snap: null, sel: null, tab: "overview", theme: localStorage.getItem("aipe-theme") || "" };
const STAGES = [
  { key: "dispatched", label: "Dispatched", cls: "active", match: ["dispatched"] },
  { key: "delivered", label: "Delivered", cls: "delivered", match: ["delivered"] },
  { key: "escalated", label: "Escalated", cls: "escalated", match: ["escalated"] },
  { key: "merged", label: "Merged", cls: "merged", match: ["merged"] },
];
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const el = (id) => document.getElementById(id);

// worker status → shared status class
function statusCls(st) { return ["active", "delivered", "escalated", "available"].includes(st) ? st : "available"; }
function stageOf(status) { const s = STAGES.find((g) => g.match.includes(status)); return s ? s.key : status === "removed" ? "removed" : "dispatched"; }

// ── Theme ──────────────────────────────────────────────────────────────────
function applyTheme() {
  if (S.theme) document.documentElement.setAttribute("data-theme", S.theme);
  else document.documentElement.removeAttribute("data-theme");
}
el("themeBtn").onclick = () => {
  const cur = document.documentElement.getAttribute("data-theme");
  S.theme = cur === "dark" ? "light" : cur === "light" ? "" : "dark";
  localStorage.setItem("aipe-theme", S.theme);
  applyTheme();
};
applyTheme();

// ── Top bar ────────────────────────────────────────────────────────────────
function renderTop(s) {
  el("ctxName").textContent = s.context.name;
  el("coordName").textContent = "· coordinator " + s.context.coordinator;
  const c = s.counts;
  el("kpis").innerHTML = [
    ["", c.hired, "hired"],
    ["s-active", c.active, "active"],
    ["s-available", c.available, "available"],
    ["s-delivered", c.delivered, "delivered"],
    ["s-escalated", c.escalated, "escalated"],
    ["", s.worktrees, "worktrees"],
    ["", s.skills, "skills"],
    ["", s.mcps, "mcps"],
  ].map(([cls, n, lbl]) => `<span class="kpi ${cls}"><b>${n}</b>${lbl}</span>`).join("");
}

// ── Org chart (desktop SVG) ─────────────────────────────────────────────────
function renderOrg(s) {
  el("orgCount").textContent = `${s.repos.length} repos · ${s.counts.hired} specialists`;
  const repos = s.repos;
  const specsByRepo = {};
  repos.forEach((r) => (specsByRepo[r] = s.workers.filter((w) => w.repo === r)));
  const COLW = (r) => Math.max(150, specsByRepo[r].length * 128 || 150);
  const gap = 30;
  let x = 20, cols = [];
  repos.forEach((r) => { const w = COLW(r); cols.push({ r, x, w, cx: x + w / 2 }); x += w + gap; });
  const totalW = Math.max(560, x + 20);
  const yCoord = 44, yRepo = 150, ySpec0 = 250, specH = 62;
  const maxSpecs = Math.max(1, ...repos.map((r) => specsByRepo[r].length));
  const totalH = ySpec0 + maxSpecs * specH + 20;
  const cxAll = totalW / 2;
  const P = [];
  // relation edges (repo → repo), drawn as arcs above the repo row
  (s.relations || []).forEach((e) => {
    const a = cols.find((c) => c.r === e.from), b = cols.find((c) => c.r === e.to);
    if (!a || !b) return;
    const y = yRepo - 8, midx = (a.cx + b.cx) / 2, lift = 46 + Math.abs(a.cx - b.cx) * 0.06;
    P.push(`<path class="edge" d="M ${a.cx} ${y} Q ${midx} ${y - lift} ${b.cx} ${y}" />`);
    P.push(`<text class="edge-label" x="${midx}" y="${y - lift + 4}" text-anchor="middle">${esc(e.type)}</text>`);
  });
  // coordinator → repo links + repo → specialist links
  cols.forEach((c) => {
    P.push(`<path class="link" d="M ${cxAll} ${yCoord + 20} C ${cxAll} ${yRepo}, ${c.cx} ${yCoord + 20}, ${c.cx} ${yRepo - 14}" />`);
    specsByRepo[c.r].forEach((w, i) => {
      const sy = ySpec0 + i * specH;
      P.push(`<path class="link" d="M ${c.cx} ${yRepo + 34} L ${c.cx} ${sy - 2}" />`);
    });
  });
  const box = (cx, y, w, h, fill, stroke, label, sub, sel, click, tone) => {
    const x0 = cx - w / 2;
    return `<g class="node-box ${sel ? "sel" : ""}" ${click} tabindex="0">
      <rect x="${x0}" y="${y}" width="${w}" height="${h}" rx="11" fill="${fill}" stroke="${stroke}" />
      ${tone ? `<circle cx="${x0 + 13}" cy="${y + h / 2}" r="4.5" fill="${tone}"/>` : ""}
      <text x="${cx}" y="${y + (sub ? 20 : h / 2 + 4)}" text-anchor="middle" fill="var(--ink)" font-size="13" font-weight="600">${esc(label)}</text>
      ${sub ? `<text x="${cx}" y="${y + 36}" text-anchor="middle" fill="var(--ink-dim)" font-size="11">${esc(sub)}</text>` : ""}
    </g>`;
  };
  const toneVar = { active: "var(--active)", delivered: "var(--delivered)", escalated: "var(--escalated)", available: "var(--available)" };
  // coordinator
  const coord = s.workers.find((w) => w.role === "coordinator");
  const selC = S.sel && S.sel.kind === "coordinator";
  P.push(box(cxAll, yCoord, 200, 40, "var(--panel-2)", "var(--coord)", coord ? coord.name : "coordinator", "coordinator", selC, `onclick="pick('coordinator')"`, "var(--coord)"));
  // repos + specialists
  cols.forEach((c) => {
    const selR = S.sel && S.sel.kind === "repo" && S.sel.id === c.r;
    P.push(box(c.cx, yRepo - 14, Math.min(c.w - 8, 190), 48, "var(--panel)", "var(--line-strong)", c.r, (s.repoInfos.find((ri) => ri.name === c.r) || {}).stack?.join(" · ") || "repo", selR, `onclick="pick('repo','${esc(c.r)}')"`, ""));
    specsByRepo[c.r].forEach((w, i) => {
      const sy = ySpec0 + i * specH;
      const selW = S.sel && S.sel.kind === "worker" && S.sel.id === w.name;
      P.push(box(c.cx, sy, Math.min(c.w - 8, 190), 46, "var(--panel-2)", `var(--${statusCls(w.status)})`, w.name, w.role, selW, `onclick="pick('worker','${esc(w.name)}')"`, toneVar[statusCls(w.status)]));
    });
    if (specsByRepo[c.r].length === 0) {
      P.push(`<text x="${c.cx}" y="${ySpec0 + 16}" text-anchor="middle" class="edge-label">no specialists</text>`);
    }
  });
  el("org").innerHTML = `<svg width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}">${P.join("")}</svg>`;
}

// ── Pipeline board ──────────────────────────────────────────────────────────
function allDispatches(s) {
  const out = [];
  (s.journeys || []).forEach((j) => (j.dispatches || []).forEach((d) => out.push({ ...d, journey: j.id })));
  return out;
}
function renderBoard(s) {
  const disp = allDispatches(s);
  el("pipeCount").textContent = `${(s.journeys || []).length} journeys · ${disp.length} dispatches`;
  el("board").innerHTML = STAGES.map((g) => {
    const cards = disp.filter((d) => stageOf(d.status) === g.key);
    return `<div class="lane"><header><span class="pip bg-${g.cls}"></span>${g.label}<span style="margin-left:auto;color:var(--ink-faint)">${cards.length}</span></header>
      <div class="cards">${cards.length ? cards.map(pcard).join("") : '<div class="empty">—</div>'}</div></div>`;
  }).join("");
}
function pcard(d) {
  const cls = stageOf(d.status);
  return `<div class="pcard bd-${cls}" onclick="pickDispatch('${esc(d.journey)}','${esc(d.repo)}','${esc(d.specialist)}')">
    <div class="who">${esc(d.specialist)}</div>
    <div class="meta"><span class="repo-tag">${esc(d.repo)}</span><span>·</span><span>${esc(d.journey)}</span>${d.pr ? `<span>·</span><a href="${esc(d.pr)}" target="_blank" rel="noreferrer">PR</a>` : ""}</div>
  </div>`;
}

// ── Detail panel ────────────────────────────────────────────────────────────
function pick(kind, id) { S.sel = { kind, id }; renderDetail(S.snap); renderOrg(S.snap); if (window.matchMedia("(max-width:899px)").matches) renderMobile(S.snap); }
function pickDispatch(journey, repo, specialist) { S.sel = { kind: "dispatch", journey, repo, specialist }; renderDetail(S.snap); renderMobile(S.snap); }
window.pick = pick; window.pickDispatch = pickDispatch;

function chip(st) { const c = statusCls(st); return `<span class="chip s-${c === "available" && st === "removed" ? "removed" : c}"><span class="pip"></span>${esc(st)}</span>`; }
function renderDetail(s) {
  const box = el("detail");
  if (!S.sel) { box.innerHTML = `<h3>Detail</h3><div class="sub">Select a node, worker, or dispatch.</div><p class="hint">The org chart, pipeline cards and mobile lists are all clickable. The selected entity's full detail appears here.</p>`; return; }
  if (S.sel.kind === "coordinator") {
    const c = s.workers.find((w) => w.role === "coordinator");
    box.innerHTML = `<h3>${esc(c ? c.name : "Coordinator")}</h3><div class="sub">coordinator · ${esc(s.context.name)}</div>
      <dl><dt>repos</dt><dd>${esc(s.repos.join(", "))}</dd><dt>specialists</dt><dd>${s.counts.hired}</dd></dl>
      <div class="hint" style="margin-top:12px">The coordinator decomposes demands and dispatches specialists. It has no worktree of its own.</div>`;
    return;
  }
  if (S.sel.kind === "worker") {
    const w = s.workers.find((x) => x.name === S.sel.id); if (!w) { box.innerHTML = "—"; return; }
    const wts = (s.worktreeRows || []).filter((r) => r.repo === w.repo);
    const disp = allDispatches(s).filter((d) => d.repo === w.repo && d.specialist.toLowerCase() === w.name.toLowerCase());
    box.innerHTML = `<h3>${esc(w.name)}</h3><div class="sub">${esc(w.role)} · ${esc(w.repo || "")}</div>
      <dl><dt>status</dt><dd>${chip(w.status)}</dd>${w.journey ? `<dt>journey</dt><dd>${esc(w.journey)}</dd>` : ""}${w.pr ? `<dt>PR</dt><dd><a href="${esc(w.pr)}" target="_blank" rel="noreferrer">${esc(w.pr)}</a></dd>` : ""}</dl>
      ${disp.length ? `<div class="section"><h4>Dispatches</h4><div class="mini">${disp.map((d) => `<div class="row">${chip(d.status)}<span>${esc(d.journey)}</span>${d.pr ? `<a href="${esc(d.pr)}" target="_blank" rel="noreferrer">PR</a>` : ""}</div>`).join("")}</div></div>` : ""}
      ${wts.length ? `<div class="section"><h4>Worktrees (${wts.length})</h4><div class="mini">${wts.map((r) => `<div class="row"><span class="mono">${esc(r.branch)}</span></div>`).join("")}</div></div>` : ""}`;
    return;
  }
  if (S.sel.kind === "repo") {
    const info = (s.repoInfos || []).find((r) => r.name === S.sel.id) || { name: S.sel.id, stack: [] };
    const specs = s.workers.filter((w) => w.repo === S.sel.id);
    const rels = (s.relations || []).filter((e) => e.from === S.sel.id || e.to === S.sel.id);
    const skills = (s.toolboxDetail?.skills || []).filter((k) => k.repos.includes(S.sel.id));
    const wts = (s.worktreeRows || []).filter((r) => r.repo === S.sel.id);
    box.innerHTML = `<h3>${esc(info.name)}</h3><div class="sub">${info.stack.length ? esc(info.stack.join(" · ")) : "repo"}</div>
      <div class="section"><h4>Specialists</h4><div class="mini">${specs.length ? specs.map((w) => `<div class="row">${chip(w.status)}<b>${esc(w.name)}</b><span class="rl" style="color:var(--ink-dim)">${esc(w.role)}</span></div>`).join("") : '<span class="hint">none hired</span>'}</div></div>
      ${rels.length ? `<div class="section"><h4>Relations</h4><div class="mini">${rels.map((e) => `<div class="row"><span class="mono">${esc(e.from)} → ${esc(e.to)}</span><span class="chip s-available" style="border-color:var(--line-strong)">${esc(e.type)}</span></div>${e.detail ? `<div class="hint" style="margin:-2px 0 4px 2px">${esc(e.detail)}</div>` : ""}`).join("")}</div></div>` : ""}
      ${skills.length ? `<div class="section"><h4>Toolbox</h4><div class="mini">${skills.map((k) => `<div class="row"><b>${esc(k.name)}</b></div><div class="hint" style="margin:-2px 0 2px 2px">${esc(k.whenToUse)}</div>`).join("")}</div></div>` : ""}
      ${wts.length ? `<div class="section"><h4>Worktrees</h4><div class="mini">${wts.map((r) => `<div class="row"><span class="mono">${esc(r.branch)}</span></div>`).join("")}</div></div>` : ""}`;
    return;
  }
  if (S.sel.kind === "dispatch") {
    const j = (s.journeys || []).find((x) => x.id === S.sel.journey);
    const d = j && j.dispatches.find((x) => x.repo === S.sel.repo && x.specialist === S.sel.specialist);
    if (!d) { box.innerHTML = "—"; return; }
    box.innerHTML = `<h3>${esc(d.specialist)}</h3><div class="sub">${esc(d.repo)} · journey ${esc(j.id)}</div>
      <dl><dt>stage</dt><dd>${chip(d.status)}</dd><dt>branch</dt><dd class="mono">${esc(d.branch)}</dd>${d.worktree ? `<dt>worktree</dt><dd class="mono">${esc(d.worktree)}</dd>` : ""}${d.pr ? `<dt>PR</dt><dd><a href="${esc(d.pr)}" target="_blank" rel="noreferrer">${esc(d.pr)}</a></dd>` : ""}</dl>
      <div class="section"><h4>Journey ${esc(j.id)}</h4><div class="mini">${j.dispatches.map((x) => `<div class="row">${chip(x.status)}<span class="repo-tag">${esc(x.repo)}</span><span>${esc(x.specialist)}</span></div>`).join("")}</div></div>`;
    return;
  }
}

// ── Mobile experience ───────────────────────────────────────────────────────
function renderMobile(s) {
  const m = el("mobile"); if (!s) return;
  if (S.tab === "overview") {
    m.innerHTML = `<div class="m-section">${s.repos.map((r) => {
      const specs = s.workers.filter((w) => w.repo === r);
      const info = (s.repoInfos || []).find((x) => x.name === r) || { stack: [] };
      return `<details class="m-repo" open><summary><span class="rname">${esc(r)}</span><span class="stack">${esc(info.stack.join(" · "))}</span><span style="margin-left:auto" class="hint">${specs.length}</span></summary>
        ${specs.length ? specs.map((w) => `<div class="worker" onclick="pick('worker','${esc(w.name)}')">${chip(w.status)}<span class="nm">${esc(w.name)}</span><span class="rl">${esc(w.role)}</span><span style="margin-left:auto" class="hint">${w.journey ? esc(w.journey) : ""}</span></div>`).join("") : '<div class="worker"><span class="hint">no specialists hired</span></div>'}
      </details>`;
    }).join("")}</div>
    ${S.sel ? `<section class="card detail" style="padding:16px" id="mdetail"></section>` : ""}`;
    if (S.sel) el("mdetail") && (el("mdetail").innerHTML = el("detail").innerHTML);
  } else if (S.tab === "org") {
    const coord = s.workers.find((w) => w.role === "coordinator");
    m.innerHTML = `<div class="m-tree"><ul><li><span class="tnode"><span class="chip s-available" style="border-color:var(--coord);color:var(--coord)"><span class="pip"></span>${esc(coord ? coord.name : "coordinator")}</span></span>
      <ul>${s.repos.map((r) => {
        const specs = s.workers.filter((w) => w.repo === r);
        return `<li><span class="tnode" onclick="pick('repo','${esc(r)}')"><b>${esc(r)}</b></span>
          <ul>${specs.map((w) => `<li><span class="tnode" onclick="pick('worker','${esc(w.name)}')">${chip(w.status)} ${esc(w.name)}</span></li>`).join("") || '<li class="hint">no specialists</li>'}</ul></li>`;
      }).join("")}</ul></li></ul></div>
      ${S.sel ? `<section class="card detail" style="padding:16px;margin-top:12px" id="mdetail"></section>` : ""}`;
    if (S.sel) el("mdetail") && (el("mdetail").innerHTML = el("detail").innerHTML);
  } else if (S.tab === "pipeline") {
    const disp = allDispatches(s);
    m.innerHTML = (s.journeys || []).length === 0 ? '<p class="hint">No journeys yet.</p>' :
      (s.journeys || []).map((j) => `<div class="m-section"><h4 style="margin:4px 2px;font-size:12px;letter-spacing:.08em;color:var(--ink-faint)">${esc(j.id)}</h4>
        <div class="timeline">${(j.dispatches || []).map((d) => `<div class="ev" onclick="pickDispatch('${esc(j.id)}','${esc(d.repo)}','${esc(d.specialist)}')">
          <div style="display:flex;align-items:center;gap:8px">${chip(d.status)}<b>${esc(d.specialist)}</b><span class="repo-tag">${esc(d.repo)}</span></div>
          <div class="mono">${esc(d.branch)}${d.pr ? ` · <a href="${esc(d.pr)}" target="_blank" rel="noreferrer">PR</a>` : ""}</div></div>`).join("")}</div></div>`).join("") +
      (S.sel && S.sel.kind === "dispatch" ? `<section class="card detail" style="padding:16px" id="mdetail"></section>` : "");
    if (S.sel && S.sel.kind === "dispatch") el("mdetail") && (el("mdetail").innerHTML = el("detail").innerHTML);
  } else if (S.tab === "terminal") {
    m.innerHTML = `<p class="hint">The terminal is docked below — tap it to expand and run commands in your workspace.</p>`;
    openTerm(true);
  }
}
el("tabbar").addEventListener("click", (e) => {
  const b = e.target.closest("button[data-tab]"); if (!b) return;
  S.tab = b.dataset.tab;
  [...el("tabbar").children].forEach((x) => x.classList.toggle("on", x === b));
  renderMobile(S.snap);
});

// ── Render orchestration ────────────────────────────────────────────────────
function render() {
  const s = S.snap; if (!s) return;
  if (!s.ok) { el("ctxName").textContent = "not an onboarded workspace"; return; }
  renderTop(s); renderOrg(s); renderBoard(s); renderDetail(s); renderMobile(s);
}

// ── Live: SSE ───────────────────────────────────────────────────────────────
function setConn(state) {
  const c = el("conn"); c.className = "conn " + state;
  el("connLabel").textContent = state === "live" ? "live" : state === "down" ? "reconnecting" : "connecting";
}
function connect() {
  const es = new EventSource("/api/stream");
  es.addEventListener("snapshot", (e) => { S.snap = JSON.parse(e.data); setConn("live"); render(); });
  es.onopen = () => setConn("live");
  // Only surface "reconnecting" on a real drop (CLOSED); transient connect
  // blips (readyState CONNECTING) shouldn't flip a working indicator.
  es.onerror = () => { if (es.readyState === 2) setConn("down"); };
}
// initial paint (in case SSE is slow) + stream
fetch("/api/snapshot").then((r) => r.json()).then((s) => { if (!S.snap) { S.snap = s; render(); } }).catch(() => {});
connect();

// ── Terminal (WebSocket) ────────────────────────────────────────────────────
let TW = null, termBusy = false;
function openTerm(open) { el("term").className = "term " + (open ? "open" : "closed"); if (open) { connectTerm(); el("termIn").focus(); } }
el("termHead").onclick = () => openTerm(!el("term").classList.contains("open"));
function termWrite(html) { const o = el("termOut"); o.insertAdjacentHTML("beforeend", html); o.scrollTop = o.scrollHeight; }

// minimal ANSI SGR → span renderer; strips cursor/OSC noise (no PTY, so this is
// enough for aipe/git/test colored output).
function ansi(text) {
  text = text.replace(/\x1b\][^\x07\x1b]*(\x07|\x1b\\)/g, ""); // OSC
  text = text.replace(/\x1b\[[0-9;?]*[A-HJKlh]/g, ""); // cursor/erase/mode
  let out = "", open = 0;
  const parts = text.split(/(\x1b\[[0-9;]*m)/);
  for (const p of parts) {
    const m = p.match(/^\x1b\[([0-9;]*)m$/);
    if (!m) { out += esc(p); continue; }
    const codes = (m[1] || "0").split(";").filter(Boolean).map(Number);
    if (codes.length === 0 || codes.includes(0)) { out += "</span>".repeat(open); open = 0; continue; }
    const cls = codes.map((c) => `a-${c}`).join(" ");
    out += `<span class="${cls}">`; open++;
  }
  return out + "</span>".repeat(open);
}
function connectTerm() {
  if (TW && (TW.readyState === 0 || TW.readyState === 1)) return;
  const proto = location.protocol === "https:" ? "wss" : "ws";
  TW = new WebSocket(`${proto}://${location.host}/api/terminal`);
  el("termState").textContent = "connecting…";
  TW.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.t === "ready") { el("termState").textContent = msg.shell + " · " + msg.cwd; el("termPs").textContent = "$"; }
    else if (msg.t === "out") termWrite(ansi(msg.d));
    else if (msg.t === "end") { termBusy = false; el("termPs").textContent = "$"; if (msg.code) termWrite(`<span class="a-90">[exit ${msg.code}]</span>\n`); }
    else if (msg.t === "exit") { el("termState").textContent = "shell exited"; }
  };
  TW.onclose = () => { el("termState").textContent = "disconnected"; };
  TW.onerror = () => { el("termState").textContent = "error"; };
}
el("termIn").addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;
  const cmd = e.target.value; e.target.value = "";
  if (!TW || TW.readyState !== 1) { connectTerm(); return; }
  termWrite(`<span class="a-92">$</span> ${esc(cmd)}\n`);
  termBusy = true; el("termPs").textContent = "…";
  TW.send(JSON.stringify({ t: "run", d: cmd }));
});
</script>
