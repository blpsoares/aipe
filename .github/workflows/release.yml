name: release

# Builds the standalone `aipe` binaries for every OS/arch and attaches them to
# a GitHub Release, so the launcher (bin/aipe) can download the right one with
# zero runtime dependency on the end user's machine. Bun cross-compiles all
# targets from a single Linux runner.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Version consistency guard
        run: bun run version:check

      - name: Tag matches manifest version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="v$(node -p "require('./.claude-plugin/plugin.json').version")"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Release tag '$TAG' does not match manifest version '$VERSION'." >&2
            echo "Bump .claude-plugin/plugin.json (and run 'bun run version:check') to match the tag." >&2
            exit 1
          fi
          echo "Tag $TAG matches manifest $VERSION."

      - name: Type-check and test
        run: |
          bun run typecheck
          bun test

      - name: Build all standalone targets
        run: bun run scripts/build.ts

      - name: Checksums
        working-directory: dist
        run: sha256sum aipe-* > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/aipe-*
            dist/SHA256SUMS.txt
            scripts/install.sh
            scripts/install.ps1
          fail_on_unmatched_files: true
          generate_release_notes: true
